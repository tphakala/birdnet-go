name: Build dev container images

# Add concurrency configuration to handle multiple pushes
concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

on:
  schedule:
    # Runs at 02:00 UTC every day
    - cron: "0 2 * * *"
  workflow_dispatch:
  push:
    paths-ignore:
      - ".github/workflows/**"
      - "**.md"
    branches:
      # Only run on push to main branch
      - main

permissions:
  contents: read
  packages: write

jobs:
  # Publish the :dev / :<sha> multi-arch images through the shared reusable
  # workflow (dev strategy), so dev, nightly, and release all build and tag the
  # same way. Dev builds go to GHCR only (no Docker Hub) and skip the Podman
  # validation and cleanup jobs. Gated to push-on-main to preserve the prior
  # behaviour; the schedule/dispatch triggers above are currently no-ops under
  # this gate (kept for parity with the previous workflow).
  dev:
    if: github.event_name == 'push' && github.ref_name == 'main'
    uses: ./.github/workflows/docker-build-push.yml
    with:
      tag-strategy: "dev"
      version: ${{ github.sha }}
      create-latest-tag: false
      platforms: '["linux/amd64", "linux/arm64"]'
      push-to-ghcr: true
      push-to-dockerhub: false
      cleanup-old-images: false
      validate-podman: false
    secrets: inherit

name: BirdNET-Go Nightly Build

on:
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  nightly:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            os: ubuntu-24.04
          - goos: linux
            goarch: arm64
            os: ubuntu-24.04
          - goos: windows
            goarch: amd64
            os: ubuntu-24.04
          - goos: darwin
            goarch: arm64
            os: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Get Build Version
        id: get_build_version
        run: |
          # Use simple date format for nightly builds
          DATE=$(date +'%Y%m%d')
          echo "build_version=nightly-${DATE}" >> "$GITHUB_OUTPUT"

      - name: Build BirdNET-Go binary
        uses: ./.github/actions/build-birdnet-binary
        with:
          goos: ${{ matrix.goos }}
          goarch: ${{ matrix.goarch }}
          build-version: ${{ steps.get_build_version.outputs.build_version }}
          tarball-suffix: ''
          github-token: ${{ secrets.GITHUB_TOKEN }}
          sentry-dsn: ${{ secrets.SENTRY_DSN }}
          sentry-auth-token: ${{ secrets.SENTRY_AUTH_TOKEN }}

  release:
    name: Create GitHub Release
    needs: nightly
    runs-on: ubuntu-24.04
    steps:
      - name: Get Build Version
        id: get_build_version
        run: |
          DATE=$(date +'%Y%m%d')
          BUILD_VERSION="nightly-${DATE}"
          echo "build_version=${BUILD_VERSION}" >> $GITHUB_OUTPUT

      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: birdnet-go-*

      - name: List artifacts
        run: find artifacts -type f

      - name: Generate checksums
        run: |
          # SHA-256 of every tarball, keyed by basename so the manifest
          # generator can map a checksum to a release asset by file name.
          find artifacts -name '*.tar.gz' -print0 | while IFS= read -r -d '' f; do
            echo "$(sha256sum "$f" | cut -d' ' -f1)  $(basename "$f")"
          done | sort > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        run: |
          REPO="${{ github.repository }}"
          TAG="${{ steps.get_build_version.outputs.build_version }}"
          # If the tag is poisoned from a previous failed run, append run number
          if ! gh release create "$TAG" \
            artifacts/**/*.tar.gz checksums.txt \
            --repo "$REPO" \
            --title "Nightly Build $TAG" \
            --notes "Nightly build $TAG" \
            --prerelease \
            --target main 2>/dev/null; then
            TAG="${TAG}-${{ github.run_number }}"
            gh release create "$TAG" \
              artifacts/**/*.tar.gz checksums.txt \
              --repo "$REPO" \
              --title "Nightly Build $TAG" \
              --notes "Nightly build $TAG" \
              --prerelease \
              --target main
          fi
          echo "Created release: $TAG"
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}

  # Regenerate the release manifest after the nightly release (its tarballs and
  # checksums.txt) and the container images are published, so the moving
  # :nightly tag the manifest advertises already points at this build. No
  # if-guard: every successful nightly run should refresh the manifest.
  manifest:
    name: Update release manifest
    needs: [release, docker]
    uses: ./.github/workflows/release-manifest.yml
    permissions:
      contents: write

  get-version:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Get version
        id: get_version
        run: |
          # Use same version format as binary builds for consistency
          DATE=$(date +'%Y%m%d')
          BUILD_VERSION="nightly-${DATE}"
          echo "VERSION=${BUILD_VERSION}" >> ${GITHUB_ENV}
          echo "version=${BUILD_VERSION}" >> $GITHUB_OUTPUT

  docker:
    needs: get-version
    uses: ./.github/workflows/docker-build-push.yml
    with:
      tag-strategy: "nightly"
      version: ${{ needs.get-version.outputs.version }}
      create-latest-tag: true
      platforms: '["linux/amd64", "linux/arm64"]'
      push-to-ghcr: true
      push-to-dockerhub: true
      cleanup-old-images: true
      keep-images-count: 14
    secrets: inherit

  cleanup:
    name: Cleanup old nightly releases
    needs: release
    runs-on: ubuntu-24.04
    # Run cleanup even if some builds failed, but not if cancelled
    if: ${{ !cancelled() }}
    steps:
      - name: Delete old releases
        # Non-critical cleanup - don't fail the workflow if this errors
        continue-on-error: true
        uses: dev-drprasad/delete-older-releases@dfbe6be2a006e9475dfcbe5b8d201f1824c2a9fe # v0.3.4
        with:
          keep_latest: 14
          delete_tags: true
          delete_tag_pattern: ^nightly-
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

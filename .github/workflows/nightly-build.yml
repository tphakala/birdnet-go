name: BirdNET-Go Nightly Build

on:
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  nightly:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            os: ubuntu-24.04
          - goos: linux
            goarch: arm64
            os: ubuntu-24.04
          - goos: windows
            goarch: amd64
            os: ubuntu-24.04
          - goos: darwin
            goarch: arm64
            os: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          check-latest: true

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-24.04'
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: build-essential pkg-config gcc-aarch64-linux-gnu gcc-mingw-w64-x86-64
          version: 1.0

      - name: Fix cross-compiler symlinks
        if: matrix.os == 'ubuntu-24.04'
        run: |
          # cache-apt-pkgs-action restores debs but skips post-install triggers,
          # so create the symlinks that update-alternatives would normally manage
          sudo ln -sf /usr/bin/x86_64-w64-mingw32-gcc-posix /usr/bin/x86_64-w64-mingw32-gcc
          sudo ln -sf /usr/bin/x86_64-w64-mingw32-g++-posix /usr/bin/x86_64-w64-mingw32-g++
          sudo ln -sf /usr/bin/aarch64-linux-gnu-gcc-13 /usr/bin/aarch64-linux-gnu-gcc

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Get Build Version
        id: get_build_version
        run: |
          # Use simple date format for nightly builds
          DATE=$(date +'%Y%m%d')
          BUILD_VERSION="nightly-${DATE}"
          echo "BUILD_VERSION=${BUILD_VERSION}" >> ${GITHUB_ENV}
          echo "build_version=${BUILD_VERSION}" >> $GITHUB_OUTPUT

      - name: Setup ONNX Runtime
        uses: ./.github/actions/setup-onnxruntime
        with:
          target-platform: ${{ matrix.goos }}-${{ matrix.goarch }}

      - name: Build BirdNET-Go
        run: |
          # Build the application
          task ${{ matrix.goos }}_${{ matrix.goarch }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
          BUILD_VERSION: ${{ env.BUILD_VERSION }}
          PUPPETEER_SKIP_DOWNLOAD: true
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: true

      - name: Upload source maps to Sentry
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: tphakala
          SENTRY_PROJECT: birdnet-go
        run: |
          npx @sentry/cli sourcemaps upload \
            --release "birdnet-go@${{ env.BUILD_VERSION }}" \
            --url-prefix '~/ui/assets/' \
            frontend/dist/

      - name: Create Release Artifacts
        run: |
          # Create artifacts directory
          mkdir -p artifacts

          # Set binary name based on OS
          BINARY_NAME=birdnet-go
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BINARY_NAME=birdnet-go.exe
          fi

          # Copy binary
          cp bin/$BINARY_NAME artifacts/

          # Copy required library files based on OS and architecture
          if [ "${{ matrix.goos }}" = "linux" ]; then
            if [ "${{ matrix.goarch }}" = "amd64" ]; then
              cp /usr/lib/libtensorflowlite_c.so artifacts/
              cp /usr/lib/libonnxruntime.so artifacts/
            elif [ "${{ matrix.goarch }}" = "arm64" ]; then
              cp /usr/aarch64-linux-gnu/lib/libtensorflowlite_c.so artifacts/
              cp /usr/aarch64-linux-gnu/lib/libonnxruntime.so artifacts/
            fi
          elif [ "${{ matrix.goos }}" = "windows" ]; then
            cp /usr/x86_64-w64-mingw32/lib/tensorflowlite_c.dll artifacts/
            cp /tmp/onnxruntime/lib/*.dll artifacts/
          elif [ "${{ matrix.goos }}" = "darwin" ]; then
            cp /opt/homebrew/lib/libtensorflowlite_c.dylib artifacts/
            cp /tmp/onnxruntime/lib/libonnxruntime.dylib artifacts/
          fi

          # Copy platform-specific README
          if [ "${{ matrix.goos }}" = "linux" ]; then
            cp dist/README-linux.md artifacts/README.md
          elif [ "${{ matrix.goos }}" = "windows" ]; then
            cp dist/README-windows.md artifacts/README.md
          elif [ "${{ matrix.goos }}" = "darwin" ]; then
            cp dist/README-darwin.md artifacts/README.md
          fi

          # Create tarball
          cd artifacts
          tar czf ../birdnet-go-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz *

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: birdnet-go-${{ matrix.goos }}-${{ matrix.goarch }}
          path: birdnet-go-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz

  release:
    name: Create GitHub Release
    needs: nightly
    runs-on: ubuntu-latest
    steps:
      - name: Get Build Version
        id: get_build_version
        run: |
          DATE=$(date +'%Y%m%d')
          BUILD_VERSION="nightly-${DATE}"
          echo "build_version=${BUILD_VERSION}" >> $GITHUB_OUTPUT

      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: birdnet-go-*

      - name: List artifacts
        run: find artifacts -type f

      - name: Create GitHub Release
        run: |
          REPO="${{ github.repository }}"
          TAG="${{ steps.get_build_version.outputs.build_version }}"
          # If the tag is poisoned from a previous failed run, append run number
          if ! gh release create "$TAG" \
            artifacts/**/*.tar.gz \
            --repo "$REPO" \
            --title "Nightly Build $TAG" \
            --notes "Nightly build $TAG" \
            --prerelease \
            --target main 2>/dev/null; then
            TAG="${TAG}-${{ github.run_number }}"
            gh release create "$TAG" \
              artifacts/**/*.tar.gz \
              --repo "$REPO" \
              --title "Nightly Build $TAG" \
              --notes "Nightly build $TAG" \
              --prerelease \
              --target main
          fi
          echo "Created release: $TAG"
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}

  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get version
        id: get_version
        run: |
          # Use same version format as binary builds for consistency
          DATE=$(date +'%Y%m%d')
          BUILD_VERSION="nightly-${DATE}"
          echo "VERSION=${BUILD_VERSION}" >> ${GITHUB_ENV}
          echo "version=${BUILD_VERSION}" >> $GITHUB_OUTPUT

  docker:
    needs: get-version
    uses: ./.github/workflows/docker-build-push.yml
    with:
      tag-strategy: "nightly"
      version: ${{ needs.get-version.outputs.version }}
      create-latest-tag: true
      platforms: '["linux/amd64", "linux/arm64"]'
      push-to-ghcr: true
      push-to-dockerhub: true
      cleanup-old-images: true
      keep-images-count: 14
    secrets: inherit

  cleanup:
    name: Cleanup old nightly releases
    needs: release
    runs-on: ubuntu-latest
    # Run cleanup even if some builds failed, but not if cancelled
    if: ${{ !cancelled() }}
    steps:
      - name: Delete old releases
        # Non-critical cleanup - don't fail the workflow if this errors
        continue-on-error: true
        uses: dev-drprasad/delete-older-releases@v0.3.4
        with:
          keep_latest: 14
          delete_tags: true
          delete_tag_pattern: ^nightly-
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
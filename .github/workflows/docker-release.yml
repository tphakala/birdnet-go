name: Docker Release Build

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        platform: [linux/amd64, linux/arm64]
        
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Fetch all history for all tags

      - name: Get latest tag
        id: get_latest_tag
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0)
          echo "VERSION=${LATEST_TAG}" >> $GITHUB_ENV
          echo "VERSION_NO_V=${LATEST_TAG#v}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        run: |
          for attempt in 1 2 3; do
            if echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin; then
              echo "GHCR login succeeded"
              exit 0
            fi
            echo "GHCR login attempt $attempt/3 failed, retrying in 15s..."
            sleep 15
          done
          echo "GHCR login failed after 3 attempts"
          exit 1

      - name: Generate downcase repository name
        run: |
          echo "REPO=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ env.REPO }}
          tags: |
            type=raw,value=${{ env.VERSION }}-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
            type=raw,value=${{ env.VERSION_NO_V }}-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
            type=raw,value=latest-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: ${{ matrix.platform }}
          build-args: |
            VERSION=${{ env.VERSION }}
            BUILDKIT_INLINE_CACHE=1
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=gha
            type=registry,ref=ghcr.io/${{ env.REPO }}:buildcache
          cache-to: |
            type=gha,mode=max
            type=registry,ref=ghcr.io/${{ env.REPO }}:buildcache,mode=max
          provenance: false

  create-manifest:
    needs: docker
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: get_latest_tag
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0)
          echo "VERSION=${LATEST_TAG}" >> $GITHUB_ENV
          echo "VERSION_NO_V=${LATEST_TAG#v}" >> $GITHUB_ENV

      - name: Login to GitHub Container Registry
        run: |
          for attempt in 1 2 3; do
            if echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin; then
              echo "GHCR login succeeded"
              exit 0
            fi
            echo "GHCR login attempt $attempt/3 failed, retrying in 15s..."
            sleep 15
          done
          echo "GHCR login failed after 3 attempts"
          exit 1

      - name: Generate downcase repository name
        run: |
          echo "REPO=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Create and push manifest
        run: |
          retry() {
            local max=3 delay=15 attempt=1
            while [ $attempt -le $max ]; do
              if "$@"; then return 0; fi
              echo "  Attempt $attempt/$max failed, retrying in ${delay}s..."
              sleep $delay
              attempt=$((attempt + 1))
            done
            echo "Failed after $max attempts: $*"
            return 1
          }

          # Create and push the versioned manifest (with v prefix)
          retry docker manifest create --amend ghcr.io/${{ env.REPO }}:${{ env.VERSION }} \
            ghcr.io/${{ env.REPO }}:${{ env.VERSION }}-amd64 \
            ghcr.io/${{ env.REPO }}:${{ env.VERSION }}-arm64
          retry docker manifest push --purge ghcr.io/${{ env.REPO }}:${{ env.VERSION }}

          # Create and push the versioned manifest (without v prefix)
          retry docker manifest create --amend ghcr.io/${{ env.REPO }}:${{ env.VERSION_NO_V }} \
            ghcr.io/${{ env.REPO }}:${{ env.VERSION }}-amd64 \
            ghcr.io/${{ env.REPO }}:${{ env.VERSION }}-arm64
          retry docker manifest push --purge ghcr.io/${{ env.REPO }}:${{ env.VERSION_NO_V }}

          # Create and push the latest manifest
          retry docker manifest create --amend ghcr.io/${{ env.REPO }}:latest \
            ghcr.io/${{ env.REPO }}:latest-amd64 \
            ghcr.io/${{ env.REPO }}:latest-arm64
          retry docker manifest push --purge ghcr.io/${{ env.REPO }}:latest
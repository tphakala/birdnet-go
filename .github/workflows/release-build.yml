name: BirdNET-Go Release Build

on:
  release:
    types: [created, edited]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build:
    if: ${{ !contains(github.ref, 'nightly') && (github.event_name == 'release' || github.event_name == 'workflow_dispatch') }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            os: ubuntu-24.04
          - goos: linux
            goarch: arm64
            os: ubuntu-24.04
          - goos: windows
            goarch: amd64
            os: ubuntu-24.04
          - goos: darwin
            goarch: arm64
            os: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Build BirdNET-Go binary
        uses: ./.github/actions/build-birdnet-binary
        with:
          goos: ${{ matrix.goos }}
          goarch: ${{ matrix.goarch }}
          build-version: ${{ github.ref_name }}
          tarball-suffix: "-${{ github.ref_name }}"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          sentry-dsn: ${{ secrets.SENTRY_DSN }}
          sentry-auth-token: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Get latest release tag
        if: github.event_name == 'workflow_dispatch'
        id: latest_release
        run: |
          # Get the latest release tag
          # Restrict to stable release tags; the auto-update "manifest"
          # prerelease tag would otherwise be picked as the nearest ancestor.
          LATEST_TAG=$(git describe --tags --abbrev=0 --match 'v*')
          echo "LATEST_TAG=${LATEST_TAG}" >> "${GITHUB_ENV}"
          echo "latest_tag=${LATEST_TAG}" >> "${GITHUB_OUTPUT}"
      
      - name: Add Artifacts to GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          files: birdnet-go-${{ matrix.goos }}-${{ matrix.goarch }}-${{ github.ref_name }}.tar.gz
          # For release events, use the triggering release
          # For workflow_dispatch, use the latest release tag
          tag_name: ${{ github.event_name == 'workflow_dispatch' && env.LATEST_TAG || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
  checksums:
    if: ${{ !contains(github.ref, 'nightly') && (github.event_name == 'release' || github.event_name == 'workflow_dispatch') }}
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: birdnet-go-*

      - name: Generate checksums
        run: |
          # SHA-256 of every tarball, keyed by basename so the manifest
          # generator can map a checksum to a release asset by file name.
          find artifacts -name '*.tar.gz' -print0 | while IFS= read -r -d '' f; do
            echo "$(sha256sum "$f" | cut -d' ' -f1)  $(basename "$f")"
          done | sort > checksums.txt
          cat checksums.txt

      - name: Get latest release tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          # Restrict to stable release tags; the auto-update "manifest"
          # prerelease tag would otherwise be picked as the nearest ancestor.
          LATEST_TAG=$(git describe --tags --abbrev=0 --match 'v*')
          echo "LATEST_TAG=${LATEST_TAG}" >> "${GITHUB_ENV}"

      - name: Add checksums to GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          files: checksums.txt
          # For release events, attach to the triggering release; for
          # workflow_dispatch, attach to the latest release tag.
          tag_name: ${{ github.event_name == 'workflow_dispatch' && env.LATEST_TAG || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  get-version:
    if: ${{ !contains(github.ref, 'nightly') && (github.event_name == 'release' || github.event_name == 'workflow_dispatch') }}
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Get version
        id: get_version
        run: |
          # Restrict to stable release tags so a workflow_dispatch from a
          # non-tagged ref does not resolve to the "manifest" prerelease tag.
          VERSION=$(git describe --tags --always --match 'v*')
          echo "VERSION=${VERSION}" >> ${GITHUB_ENV}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

  docker:
    if: ${{ !contains(github.ref, 'nightly') && (github.event_name == 'release' || github.event_name == 'workflow_dispatch') }}
    needs: get-version
    uses: ./.github/workflows/docker-build-push.yml
    with:
      tag-strategy: "release"
      version: ${{ needs.get-version.outputs.version }}
      create-latest-tag: true
      platforms: '["linux/amd64", "linux/arm64"]'
      push-to-ghcr: true
      push-to-dockerhub: true
      cleanup-old-images: false
      keep-images-count: 14
    secrets: inherit

  # Regenerate the release manifest after the tarballs (build), checksums.txt
  # (checksums), and container images (docker) are all published, so it never
  # races the asset uploads or advertises image tags before they are pushed.
  # The if-guard mirrors the other jobs and must stay in sync with them.
  manifest:
    if: ${{ !contains(github.ref, 'nightly') && (github.event_name == 'release' || github.event_name == 'workflow_dispatch') }}
    needs: [build, checksums, docker]
    uses: ./.github/workflows/release-manifest.yml
    permissions:
      contents: write

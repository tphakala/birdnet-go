name: BirdNET-Go Release Build

on:
  release:
    # Only 'created' triggers a build. 'edited' is deliberately excluded: the
    # build is what attaches the assets, so it never needs a body edit to run,
    # and listening on 'edited' meant any later change to the release (fixing
    # the notes, toggling latest) re-ran the entire multi-platform build. To
    # rebuild on demand, use the workflow_dispatch entry below or re-run the
    # failed run; do not re-add 'edited'.
    types: [created]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

# Serialize release builds per tag. If a second trigger for the same release
# ever fires (for example a manual dispatch overlapping the created build), it
# queues behind the running one instead of racing it on asset uploads and
# container image pushes. cancel-in-progress is false so an in-flight build,
# which may be mid-push, is never killed.
concurrency:
  group: release-build-${{ github.event.release.tag_name || github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    if: ${{ !contains(github.ref, 'nightly') && (github.event_name == 'workflow_dispatch' || (github.event_name == 'release' && github.event.action == 'created')) }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            os: ubuntu-24.04
          - goos: linux
            goarch: arm64
            os: ubuntu-24.04
          - goos: windows
            goarch: amd64
            os: ubuntu-24.04
          - goos: darwin
            goarch: arm64
            os: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Determine build version
        id: ver
        env:
          # Passed via env, not inline ${{ }}, so a crafted ref name cannot
          # inject shell (defense in depth against the template-injection class).
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          # On a release event the ref is the release tag. On a manual dispatch
          # from a branch, resolve the latest stable tag instead, so the binaries
          # are versioned and attached to that release rather than the branch
          # name (e.g. "main"). This matches the release the artifacts attach to
          # below and keeps BUILD_VERSION, the tarball name, and the attach
          # target consistent.
          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            VERSION=$(git describe --tags --abbrev=0 --match 'v*')
          else
            VERSION="${REF_NAME}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building release version: ${VERSION}"

      - name: Build BirdNET-Go binary
        uses: ./.github/actions/build-birdnet-binary
        with:
          goos: ${{ matrix.goos }}
          goarch: ${{ matrix.goarch }}
          build-version: ${{ steps.ver.outputs.version }}
          tarball-suffix: "-${{ steps.ver.outputs.version }}"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          sentry-dsn: ${{ secrets.SENTRY_DSN }}
          sentry-auth-token: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Add Artifacts to GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          files: birdnet-go-${{ matrix.goos }}-${{ matrix.goarch }}-${{ steps.ver.outputs.version }}.tar.gz
          # Release event: attach to the triggering release (empty tag_name).
          # Dispatch: attach to the resolved latest stable tag.
          tag_name: ${{ github.event_name == 'workflow_dispatch' && steps.ver.outputs.version || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
  checksums:
    if: ${{ !contains(github.ref, 'nightly') && (github.event_name == 'workflow_dispatch' || (github.event_name == 'release' && github.event.action == 'created')) }}
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: birdnet-go-*

      - name: Generate checksums
        run: |
          # SHA-256 of every tarball, keyed by basename so the manifest
          # generator can map a checksum to a release asset by file name.
          find artifacts -name '*.tar.gz' -print0 | while IFS= read -r -d '' f; do
            echo "$(sha256sum "$f" | cut -d' ' -f1)  $(basename "$f")"
          done | sort > checksums.txt
          cat checksums.txt

      - name: Get latest release tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          # Restrict to stable release tags; the auto-update "manifest"
          # prerelease tag would otherwise be picked as the nearest ancestor.
          LATEST_TAG=$(git describe --tags --abbrev=0 --match 'v*')
          echo "LATEST_TAG=${LATEST_TAG}" >> "${GITHUB_ENV}"

      - name: Add checksums to GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          files: checksums.txt
          # For release events, attach to the triggering release; for
          # workflow_dispatch, attach to the latest release tag.
          tag_name: ${{ github.event_name == 'workflow_dispatch' && env.LATEST_TAG || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  get-version:
    if: ${{ !contains(github.ref, 'nightly') && (github.event_name == 'workflow_dispatch' || (github.event_name == 'release' && github.event.action == 'created')) }}
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Get version
        id: get_version
        env:
          # Passed via env, not inline ${{ }}, so a crafted ref name cannot
          # inject shell (matches the build job's hardening).
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          # On a release event the tag IS the version (a date-based 20260712 or
          # a stable v1.2.3), so use it directly. Only fall back to git describe
          # on a manual dispatch from a non-tagged ref, restricting to stable
          # tags so it does not resolve the "manifest" prerelease tag.
          if [ "${EVENT_NAME}" = "release" ]; then
            VERSION="${REF_NAME}"
          else
            # Match the build and checksums jobs exactly (--abbrev=0), so a
            # workflow_dispatch run versions the binaries and the container
            # images with the identical clean tag rather than a describe suffix.
            VERSION=$(git describe --tags --abbrev=0 --match 'v*')
          fi
          echo "VERSION=${VERSION}" >> "${GITHUB_ENV}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

  docker:
    if: ${{ !contains(github.ref, 'nightly') && (github.event_name == 'workflow_dispatch' || (github.event_name == 'release' && github.event.action == 'created')) }}
    needs: get-version
    uses: ./.github/workflows/docker-build-push.yml
    with:
      tag-strategy: "release"
      version: ${{ needs.get-version.outputs.version }}
      create-latest-tag: true
      platforms: '["linux/amd64", "linux/arm64"]'
      push-to-ghcr: true
      push-to-dockerhub: true
      cleanup-old-images: false
      keep-images-count: 14
    secrets: inherit

  # Regenerate the release manifest after the tarballs (build), checksums.txt
  # (checksums), and container images (docker) are all published, so it never
  # races the asset uploads or advertises image tags before they are pushed.
  # The if-guard mirrors the other jobs and must stay in sync with them.
  manifest:
    if: ${{ !contains(github.ref, 'nightly') && (github.event_name == 'workflow_dispatch' || (github.event_name == 'release' && github.event.action == 'created')) }}
    needs: [build, checksums, docker]
    uses: ./.github/workflows/release-manifest.yml
    permissions:
      contents: write

  # Scan the attached tarballs and append VirusTotal results to the release body.
  # Runs after build + checksums so the assets already exist; replaces the old
  # release:published trigger on virustotal.yml, which fired before the build
  # attached any assets and always failed with "No Assets Found".
  virustotal:
    if: ${{ !contains(github.ref, 'nightly') && (github.event_name == 'workflow_dispatch' || (github.event_name == 'release' && github.event.action == 'created')) }}
    needs: [build, checksums]
    uses: ./.github/workflows/virustotal.yml
    secrets: inherit

name: BirdNET-Go Release Build

on:
  release:
    types: [created, edited]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build:
    if: ${{ !contains(github.ref, 'nightly') && (github.event_name == 'release' || github.event_name == 'workflow_dispatch') }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            os: ubuntu-24.04
          - goos: linux
            goarch: arm64
            os: ubuntu-24.04
          - goos: windows
            goarch: amd64
            os: ubuntu-24.04
          - goos: darwin
            goarch: arm64
            os: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          check-latest: true

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-24.04'
        uses: awalsh128/cache-apt-pkgs-action@681749ae568c81c2037cb9185e38b709b261bd2f # v1.6.1
        with:
          packages: build-essential pkg-config gcc-aarch64-linux-gnu gcc-mingw-w64-x86-64
          version: 1.0

      - name: Fix cross-compiler symlinks
        if: matrix.os == 'ubuntu-24.04'
        run: |
          # cache-apt-pkgs-action restores debs but skips post-install triggers,
          # so create the symlinks that update-alternatives would normally manage
          sudo ln -sf /usr/bin/x86_64-w64-mingw32-gcc-posix /usr/bin/x86_64-w64-mingw32-gcc
          sudo ln -sf /usr/bin/x86_64-w64-mingw32-g++-posix /usr/bin/x86_64-w64-mingw32-g++
          sudo ln -sf /usr/bin/aarch64-linux-gnu-gcc-13 /usr/bin/aarch64-linux-gnu-gcc

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup ONNX Runtime
        uses: ./.github/actions/setup-onnxruntime
        with:
          target-platform: ${{ matrix.goos }}-${{ matrix.goarch }}

      - name: Build BirdNET-Go
        run: |
          # Build the application
          task ${{ matrix.goos }}_${{ matrix.goarch }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
          BUILD_VERSION: ${{ github.ref_name }}
          # Baked into the binary via ldflags. Empty if the secret is unset
          # (e.g. fork PR builds), which leaves telemetry off by design.
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}

      - name: Setup Node.js for Sentry CLI
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Upload source maps to Sentry
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: tphakala
          SENTRY_PROJECT: birdnet-go
        run: |
          npx @sentry/cli sourcemaps upload \
            --release "birdnet-go@${{ github.ref_name }}" \
            --url-prefix '~/ui/assets/' \
            frontend/dist/

      - name: Create Release Artifacts
        run: |
          # Create artifacts directory
          mkdir -p artifacts
          
          # Set binary name based on OS
          BINARY_NAME=birdnet-go
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BINARY_NAME=birdnet-go.exe
          fi
          
          # Copy binary
          cp bin/$BINARY_NAME artifacts/
          
          # Copy required library files based on OS and architecture
          if [ "${{ matrix.goos }}" = "linux" ]; then
            if [ "${{ matrix.goarch }}" = "amd64" ]; then
              cp /usr/lib/libtensorflowlite_c.so artifacts/
              cp /usr/lib/libonnxruntime.so artifacts/
            elif [ "${{ matrix.goarch }}" = "arm64" ]; then
              cp /usr/aarch64-linux-gnu/lib/libtensorflowlite_c.so artifacts/
              cp /usr/aarch64-linux-gnu/lib/libonnxruntime.so artifacts/
            fi
          elif [ "${{ matrix.goos }}" = "windows" ]; then
            cp /usr/x86_64-w64-mingw32/lib/tensorflowlite_c.dll artifacts/
            cp "${RUNNER_TEMP}"/onnxruntime/lib/*.dll artifacts/
          elif [ "${{ matrix.goos }}" = "darwin" ]; then
            cp /opt/homebrew/lib/libtensorflowlite_c.dylib artifacts/
            cp "${RUNNER_TEMP}"/onnxruntime/lib/libonnxruntime.dylib artifacts/
          fi
          
          # Copy platform-specific README
          if [ "${{ matrix.goos }}" = "linux" ]; then
            cp dist/README-linux.md artifacts/README.md
          elif [ "${{ matrix.goos }}" = "windows" ]; then
            cp dist/README-windows.md artifacts/README.md
          elif [ "${{ matrix.goos }}" = "darwin" ]; then
            cp dist/README-darwin.md artifacts/README.md
          fi

          # Create tarball
          cd artifacts
          tar czf ../birdnet-go-${{ matrix.goos }}-${{ matrix.goarch }}-${{ github.ref_name }}.tar.gz *

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: birdnet-go-${{ matrix.goos }}-${{ matrix.goarch }}
          path: birdnet-go-${{ matrix.goos }}-${{ matrix.goarch }}-${{ github.ref_name }}.tar.gz

      - name: Get latest release tag
        if: github.event_name == 'workflow_dispatch'
        id: latest_release
        run: |
          # Get the latest release tag
          LATEST_TAG=$(git describe --tags --abbrev=0)
          echo "LATEST_TAG=${LATEST_TAG}" >> "${GITHUB_ENV}"
          echo "latest_tag=${LATEST_TAG}" >> "${GITHUB_OUTPUT}"
      
      - name: Add Artifacts to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: birdnet-go-${{ matrix.goos }}-${{ matrix.goarch }}-${{ github.ref_name }}.tar.gz
          # For release events, use the triggering release
          # For workflow_dispatch, use the latest release tag
          tag_name: ${{ github.event_name == 'workflow_dispatch' && env.LATEST_TAG || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
  checksums:
    if: ${{ !contains(github.ref, 'nightly') && (github.event_name == 'release' || github.event_name == 'workflow_dispatch') }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: birdnet-go-*

      - name: Generate checksums
        run: |
          # SHA-256 of every tarball, keyed by basename so the manifest
          # generator can map a checksum to a release asset by file name.
          find artifacts -name '*.tar.gz' -print0 | while IFS= read -r -d '' f; do
            echo "$(sha256sum "$f" | cut -d' ' -f1)  $(basename "$f")"
          done | sort > checksums.txt
          cat checksums.txt

      - name: Get latest release tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0)
          echo "LATEST_TAG=${LATEST_TAG}" >> "${GITHUB_ENV}"

      - name: Add checksums to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: checksums.txt
          # For release events, attach to the triggering release; for
          # workflow_dispatch, attach to the latest release tag.
          tag_name: ${{ github.event_name == 'workflow_dispatch' && env.LATEST_TAG || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  get-version:
    if: ${{ !contains(github.ref, 'nightly') && (github.event_name == 'release' || github.event_name == 'workflow_dispatch') }}
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get version
        id: get_version
        run: |
          VERSION=$(git describe --tags --always)
          echo "VERSION=${VERSION}" >> ${GITHUB_ENV}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

  docker:
    if: ${{ !contains(github.ref, 'nightly') && (github.event_name == 'release' || github.event_name == 'workflow_dispatch') }}
    needs: get-version
    uses: ./.github/workflows/docker-build-push.yml
    with:
      tag-strategy: "release"
      version: ${{ needs.get-version.outputs.version }}
      create-latest-tag: true
      platforms: '["linux/amd64", "linux/arm64"]'
      push-to-ghcr: true
      push-to-dockerhub: true
      cleanup-old-images: false
      keep-images-count: 14
    secrets: inherit

  # Regenerate the release manifest after the tarballs (build) and checksums.txt
  # (checksums) are attached, so it never races the asset uploads. The if-guard
  # mirrors the other jobs and must stay in sync with them.
  manifest:
    if: ${{ !contains(github.ref, 'nightly') && (github.event_name == 'release' || github.event_name == 'workflow_dispatch') }}
    needs: [build, checksums]
    uses: ./.github/workflows/release-manifest.yml
    permissions:
      contents: write

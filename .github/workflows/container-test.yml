name: Container test

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "Docker/**"
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - "Taskfile.yml"
      - ".github/workflows/container-test.yml"
  pull_request:
    paths:
      - "Dockerfile"
      - "Docker/**"
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - "Taskfile.yml"
      - ".github/workflows/container-test.yml"

concurrency:
  group: container-test-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  arbitrary-uid-start:
    name: Arbitrary-UID startup
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Build container image (amd64, load locally)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          load: true
          tags: birdnet-go:test
          platforms: linux/amd64
          # Reads the registry cache the publish workflow populates (anonymous,
          # public); writes/reads the PR-scoped GHA cache. Never pushes.
          cache-from: |
            type=gha
            type=registry,ref=ghcr.io/${{ github.repository }}:buildcache
          cache-to: type=gha,mode=max
          provenance: false

      - name: Arbitrary-UID startup smoke test
        run: Docker/test/arbitrary-uid-smoke.sh birdnet-go:test

      # Guards custom-.tflite users: the amd64 image must link libtensorflowlite_c
      # and route a birdnet.modelpath .tflite to the TFLite backend (the regression
      # class #3864 fixed for arm64). Selection is unit-tested; this covers the
      # runtime dlopen + Dockerfile shipping dimension unit tests cannot.
      - name: Custom .tflite model load smoke test
        run: Docker/test/custom-tflite-smoke.sh birdnet-go:test

  arbitrary-uid-start-arm64:
    name: arm64 container startup
    # Native arm64 runner (free for public repos): the only PR-time job that
    # exercises the arm64 Dockerfile path. The arm64 image ships the INT8-ARM ONNX
    # stock default and links libtensorflowlite_c for custom .tflite models.
    # Without this the arm64 image first builds on push-to-main. Custom-.tflite
    # loading is not covered here; that is validated on real arm64 hardware.
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Build container image (arm64, load locally)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          load: true
          tags: birdnet-go:test-arm64
          platforms: linux/arm64
          # Reads the registry cache the publish workflow populates (anonymous,
          # public); writes/reads an arm64-scoped GHA cache so it never collides
          # with the amd64 job's default-scope cache. Never pushes.
          cache-from: |
            type=gha,scope=arm64
            type=registry,ref=ghcr.io/${{ github.repository }}:buildcache
          cache-to: type=gha,mode=max,scope=arm64
          provenance: false

      - name: Arbitrary-UID startup smoke test (arm64)
        run: Docker/test/arbitrary-uid-smoke.sh birdnet-go:test-arm64

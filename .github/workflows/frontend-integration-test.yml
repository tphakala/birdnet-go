name: Frontend Browser Integration Tests

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'internal/api/**'
      - '.github/workflows/frontend-integration-test.yml'
  pull_request:
    paths:
      - 'frontend/**'
      - 'internal/api/**'
      - '.github/workflows/frontend-integration-test.yml'

concurrency:
  group: browser-integration-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  browser-integration-tests:
    name: Browser Integration Tests (Playwright)
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # --- Go backend setup ---
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Setup TensorFlow Lite
        uses: ./.github/actions/setup-tensorflow

      # --- Node.js setup ---
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      # --- Install Playwright browser (Chromium only, matching vitest config) ---
      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      # --- Build frontend (needed for backend dev mode serving) ---
      - name: Build frontend
        working-directory: frontend
        run: npm run build

      # --- Build backend (skipfrontend tag: uses stub embed, serves from disk) ---
      - name: Build backend
        run: |
          go build -trimpath -tags skipfrontend \
            -ldflags "-s -w" \
            -o bin/birdnet-go

      # --- Start backend ---
      - name: Start backend
        run: |
          # Start backend in background
          ./bin/birdnet-go realtime &
          BACKEND_PID=$!
          echo "BACKEND_PID=$BACKEND_PID" >> $GITHUB_ENV

          # Wait for backend to be ready
          echo "Waiting for backend health endpoint..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8080/api/v2/health > /dev/null 2>&1; then
              echo "Backend is ready (attempt $i)"
              break
            fi
            if [ $i -eq 60 ]; then
              echo "Backend failed to start within 60 seconds"
              exit 1
            fi
            sleep 1
          done

      # --- Run browser integration tests ---
      # Note: navigation.integration.test.ts is excluded because it uses
      # window.location.href navigation which breaks the Vitest browser
      # iframe connection in headless CI. It can still run locally.
      - name: Run browser integration tests
        working-directory: frontend
        run: >
          npx vitest run
          --config vitest.integration.config.ts
          --exclude '**/navigation.integration.test.ts'
        timeout-minutes: 10

      # --- Cleanup ---
      - name: Stop backend
        if: always()
        run: |
          if [ -n "$BACKEND_PID" ]; then
            kill $BACKEND_PID 2>/dev/null || true
          fi

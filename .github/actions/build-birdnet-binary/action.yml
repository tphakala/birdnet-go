name: Build BirdNET-Go binary
description: >-
  Cross-compile the BirdNET-Go binary for one GOOS/GOARCH, package it with its
  native libraries and platform README into a tarball, and upload that as a
  workflow artifact. Shared by nightly-build.yml and release-build.yml so the
  build steps live in one place. The caller checks out the repo first (and picks
  its own fetch-depth), computes the version, and handles the artifact/release
  attachment afterwards.

inputs:
  goos:
    description: Target GOOS (linux, windows, darwin).
    required: true
  goarch:
    description: Target GOARCH (amd64, arm64).
    required: true
  build-version:
    description: Version string baked into the binary as BUILD_VERSION.
    required: true
  tarball-suffix:
    description: >-
      Suffix appended to the tarball filename before ".tar.gz" (e.g. "-v1.2.3"
      for releases). Empty for nightly. The uploaded artifact name never
      includes the suffix.
    required: false
    default: ''
  github-token:
    description: Token used by setup-task for GitHub API calls.
    required: true
  sentry-dsn:
    description: Sentry DSN baked into the binary. May be empty (telemetry off).
    required: false
    default: ''
  sentry-auth-token:
    description: >-
      Sentry auth token for source-map upload. Upload runs only on linux/amd64
      and only when this is non-empty.
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: 'go.mod'
        check-latest: true

    # Linux and Windows targets cross-compile on the ubuntu runner and need the
    # cross toolchain; the darwin target runs on macOS and skips this.
    - name: Install Linux system dependencies
      if: runner.os == 'Linux'
      # Route through the shared composite for the continue-on-error +
      # outcome-checked reinstall fallback, so a corrupt apt cache (tar exit 2)
      # cannot hard-fail the build. execute-install-scripts: 'false' preserves
      # the prior behavior; the symlink fix step below handles post-install.
      uses: ./.github/actions/setup-apt-packages
      with:
        packages: build-essential pkg-config gcc-aarch64-linux-gnu gcc-mingw-w64-x86-64
        cache-version: '1.0'
        execute-install-scripts: 'false'

    - name: Fix cross-compiler symlinks
      if: runner.os == 'Linux'
      shell: bash
      run: |
        # cache-apt-pkgs-action restores debs but skips post-install triggers,
        # so create the symlinks that update-alternatives would normally manage
        sudo ln -sf /usr/bin/x86_64-w64-mingw32-gcc-posix /usr/bin/x86_64-w64-mingw32-gcc
        sudo ln -sf /usr/bin/x86_64-w64-mingw32-g++-posix /usr/bin/x86_64-w64-mingw32-g++
        # Resolve the installed aarch64 gcc version dynamically so a future
        # runner-image gcc bump does not break the symlink.
        aarch64_gcc=$(find /usr/bin -maxdepth 1 -name 'aarch64-linux-gnu-gcc-[0-9]*' | sort -V | tail -1)
        if [ -z "$aarch64_gcc" ]; then echo "::error::aarch64-linux-gnu-gcc not found"; exit 1; fi
        sudo ln -sf "$aarch64_gcc" /usr/bin/aarch64-linux-gnu-gcc

    - name: Install Task
      uses: arduino/setup-task@c0bc642852239c2689f73f4ea6459c29405f3c52 # v2
      with:
        version: 3.x
        repo-token: ${{ inputs.github-token }}

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24'
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'

    - name: Setup ONNX Runtime
      uses: ./.github/actions/setup-onnxruntime
      with:
        target-platform: ${{ inputs.goos }}-${{ inputs.goarch }}

    - name: Build BirdNET-Go
      shell: bash
      run: task "${GOOS}_${GOARCH}"
      env:
        GOOS: ${{ inputs.goos }}
        GOARCH: ${{ inputs.goarch }}
        CGO_ENABLED: 1
        BUILD_VERSION: ${{ inputs.build-version }}
        # Baked into the binary via ldflags. Empty if unset (e.g. fork builds),
        # which leaves telemetry off by design.
        SENTRY_DSN: ${{ inputs.sentry-dsn }}
        PUPPETEER_SKIP_DOWNLOAD: true
        PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: true

    - name: Upload source maps to Sentry
      if: inputs.goos == 'linux' && inputs.goarch == 'amd64' && inputs.sentry-auth-token != ''
      shell: bash
      env:
        SENTRY_AUTH_TOKEN: ${{ inputs.sentry-auth-token }}
        SENTRY_ORG: tphakala
        SENTRY_PROJECT: birdnet-go
        BUILD_VERSION: ${{ inputs.build-version }}
      run: |
        npx @sentry/cli sourcemaps upload \
          --release "birdnet-go@${BUILD_VERSION}" \
          --url-prefix '~/ui/assets/' \
          frontend/dist/

    - name: Create release artifacts
      shell: bash
      env:
        GOOS: ${{ inputs.goos }}
        GOARCH: ${{ inputs.goarch }}
        TARBALL: birdnet-go-${{ inputs.goos }}-${{ inputs.goarch }}${{ inputs.tarball-suffix }}.tar.gz
      run: |
        mkdir -p artifacts

        # Binary name (Windows gets the .exe)
        BINARY_NAME=birdnet-go
        if [ "$GOOS" = "windows" ]; then
          BINARY_NAME=birdnet-go.exe
        fi
        cp "bin/${BINARY_NAME}" artifacts/

        # Native runtime libraries per OS/arch
        if [ "$GOOS" = "linux" ]; then
          if [ "$GOARCH" = "amd64" ]; then
            cp /usr/lib/libtensorflowlite_c.so artifacts/
            cp /usr/lib/libonnxruntime.so artifacts/
          elif [ "$GOARCH" = "arm64" ]; then
            cp /usr/aarch64-linux-gnu/lib/libtensorflowlite_c.so artifacts/
            cp /usr/aarch64-linux-gnu/lib/libonnxruntime.so artifacts/
          fi
        elif [ "$GOOS" = "windows" ]; then
          cp /usr/x86_64-w64-mingw32/lib/tensorflowlite_c.dll artifacts/
          cp "${RUNNER_TEMP}"/onnxruntime/lib/*.dll artifacts/
        elif [ "$GOOS" = "darwin" ]; then
          cp /opt/homebrew/lib/libtensorflowlite_c.dylib artifacts/
          cp "${RUNNER_TEMP}"/onnxruntime/lib/libonnxruntime.dylib artifacts/
        fi

        # Platform-specific README
        if [ "$GOOS" = "linux" ]; then
          cp dist/README-linux.md artifacts/README.md
        elif [ "$GOOS" = "windows" ]; then
          cp dist/README-windows.md artifacts/README.md
        elif [ "$GOOS" = "darwin" ]; then
          cp dist/README-darwin.md artifacts/README.md
        fi

        # Tarball (suffix is empty for nightly, -<version> for releases)
        cd artifacts
        tar czf "../${TARBALL}" *

    - name: Upload build artifacts
      uses: actions/upload-artifact@v7
      with:
        name: birdnet-go-${{ inputs.goos }}-${{ inputs.goarch }}
        path: birdnet-go-${{ inputs.goos }}-${{ inputs.goarch }}${{ inputs.tarball-suffix }}.tar.gz

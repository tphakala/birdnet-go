name: 'Setup APT Packages'
description: 'Install APT packages with caching, timeouts, and automatic fallback'

inputs:
  packages:
    description: 'Space-separated list of APT packages to install'
    required: true
  cache-version:
    description: 'Cache key version (bump to invalidate)'
    required: false
    default: '1.1'

runs:
  using: 'composite'
  steps:
    # continue-on-error keeps a cache-restore infra failure (e.g. a corrupt
    # cache making tar exit 2) from failing the whole job. The verify step
    # below inspects this step's outcome and falls back to a direct install.
    - name: Install APT packages (cached)
      id: apt-cache
      continue-on-error: true
      uses: awalsh128/cache-apt-pkgs-action@681749ae568c81c2037cb9185e38b709b261bd2f # v1.6.1
      with:
        packages: ${{ inputs.packages }}
        version: ${{ inputs.cache-version }}
        execute_install_scripts: true

    - name: Refresh shared library cache and verify
      shell: bash
      run: |
        sudo ldconfig

        # Verify key binaries work; reinstall on failure
        FAILED=""
        for pkg in ${{ inputs.packages }}; do
          case "$pkg" in
            ffmpeg)
              if ! ffmpeg -version > /dev/null 2>&1; then
                FAILED="$FAILED ffmpeg"
              fi
              ;;
            sox)
              if ! sox --version > /dev/null 2>&1; then
                FAILED="$FAILED sox"
              fi
              ;;
          esac
        done

        # If the cache-restore action itself did not succeed (e.g. a corrupt
        # cache made tar exit 2), continue-on-error above kept the job alive but
        # the packages may be missing or only half-installed. Force a clean
        # reinstall of the full set so a cache/infra error can never fail the
        # whole job.
        if [ "${{ steps.apt-cache.outcome }}" != "success" ]; then
          echo "::warning::APT cache restore did not succeed (outcome=${{ steps.apt-cache.outcome }}); reinstalling packages directly"
          FAILED="$FAILED ${{ inputs.packages }}"
        fi

        if [ -n "$FAILED" ]; then
          echo "::warning::Broken after cache restore:$FAILED. Reinstalling..."
          sudo apt-get update -qq \
            -o Acquire::Retries=3 \
            -o Acquire::http::Timeout=30
          sudo apt-get install -y --fix-broken \
            -o Acquire::Retries=3 \
            -o Acquire::http::Timeout=30 \
            ${{ inputs.packages }}
          sudo ldconfig
        fi

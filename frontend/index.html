<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <title>BirdNET-Go</title>
    <!-- Preload Inter font to prevent FOUT (Flash of Unstyled Text) -->
    <!-- Note: In production, this preload may not match the served path, but the font
         will still load correctly via CSS. This is a minor optimization trade-off. -->
    <link
      rel="preload"
      href="/fonts/Inter-Variable.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <script>
      // Immediately set the theme before any content loads to prevent flash
      (function () {
        const theme = localStorage.getItem('theme') === 'dark' ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', theme);
        document.documentElement.setAttribute('data-theme-controller', theme);
      })();

      // Restore color scheme before content loads to prevent FOUC
      (function () {
        var VALID = ['blue', 'forest', 'amber', 'violet', 'rose', 'custom'];
        var s = localStorage.getItem('color-scheme');
        if (s && VALID.indexOf(s) !== -1) {
          document.documentElement.setAttribute('data-scheme', s);
          if (s === 'custom') {
            try {
              var c = JSON.parse(localStorage.getItem('custom-scheme-colors') || '{}');
              if (c.primary) {
                var root = document.documentElement.style;
                root.setProperty('--custom-primary', c.primary);
                root.setProperty('--custom-accent', c.accent || c.primary);
                // Compute contrast colors (white or dark text)
                function contrast(hex) {
                  var n = parseInt(hex.replace('#', ''), 16);
                  var r = (n >> 16) & 0xff,
                    g = (n >> 8) & 0xff,
                    b = n & 0xff;
                  function lin(v) {
                    var s = v / 255;
                    return s <= 0.04045 ? s / 12.92 : Math.pow((s + 0.055) / 1.055, 2.4);
                  }
                  var L = 0.2126 * lin(r) + 0.7152 * lin(g) + 0.0722 * lin(b);
                  return L > 0.179 ? '#020617' : '#ffffff';
                }
                root.setProperty('--custom-primary-content', contrast(c.primary));
                root.setProperty('--custom-accent-content', contrast(c.accent || c.primary));
              }
            } catch (e) {
              // Invalid JSON, skip custom colors
            }
          }
        } else {
          document.documentElement.setAttribute('data-scheme', 'blue');
        }
      })();

      // Detect and set initial locale before content loads
      (function () {
        const SUPPORTED_LOCALES = ['en', 'de', 'fr', 'es', 'fi', 'nl', 'pl', 'pt'];
        const DEFAULT_LOCALE = 'en';

        function detectBrowserLocale() {
          if (typeof navigator === 'undefined') {
            return DEFAULT_LOCALE;
          }
          const browserLanguages = navigator.languages || [navigator.language];
          for (const lang of browserLanguages) {
            if (lang) {
              const primaryCode = lang.toLowerCase().split('-')[0];
              if (SUPPORTED_LOCALES.includes(primaryCode)) {
                return primaryCode;
              }
            }
          }
          return DEFAULT_LOCALE;
        }

        let initialLocale = DEFAULT_LOCALE;
        const stored = localStorage.getItem('birdnet-locale');
        if (stored && SUPPORTED_LOCALES.includes(stored)) {
          initialLocale = stored;
        } else {
          initialLocale = detectBrowserLocale();
          try {
            localStorage.setItem('birdnet-locale', initialLocale);
          } catch (e) {
            // Ignore localStorage errors (e.g., private browsing)
          }
        }
        document.documentElement.setAttribute('lang', initialLocale);
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#10b981" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" href="/ui/assets/apple-touch-icon.png" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js', { scope: '/' }).catch(function (err) {
          console.warn('Service worker registration failed:', err);
        });
      }
    </script>
  </body>
</html>

version: '3'

vars:
  BINARY_DIR: bin
  BINARY_NAME: birdnet-go
  TFLITE_VERSION: v2.17.1
  ONNXRUNTIME_VERSION: '1.25.1'
  LABELS_DIR: internal/classifier/data/labels
  AVICOMMONS_DATA_DIR: internal/imageprovider/data
  AVICOMMONS_JSON_FILE: latest.json
  AVICOMMONS_JSON_URL: https://avicommons.org/latest.json
  BUILD_DATE:
    sh: date -u +%Y-%m-%dT%H:%M:%SZ
  VERSION:
    sh: |
      if [ ! -z "$BUILD_VERSION" ]; then
        echo "$BUILD_VERSION"
      else
        git describe --tags --always 2>/dev/null || echo "unknown"
      fi
  UNAME_S:
    sh: uname -s
  UNAME_M:
    sh: uname -m
  # Go version from go.mod (single source of truth)
  GO_VERSION:
    sh: awk '/^go /{print $2; found=1} END{if(!found) exit 1}' go.mod
  # Sentry DSN baked into the binary at link time. Read from the SENTRY_DSN
  # environment variable (mirrors how VERSION reads BUILD_VERSION). Defaults to
  # empty: plain `task` builds and forks ship with telemetry off. Official CI
  # builds inject the upstream DSN via this var; at runtime users can override it
  # with BIRDNET_GO_SENTRY_DSN without rebuilding.
  SENTRY_DSN:
    sh: echo "${SENTRY_DSN:-}"
  # Project identity baked into the binary at link time, for forks that want to
  # rebrand at build time (read from PROJECT_* env vars, mirroring SENTRY_DSN).
  # Empty by default: a plain `task` build falls back to the built-in upstream
  # defaults in internal/branding. At runtime these can be overridden with the
  # BIRDNET_GO_PROJECT_* environment variables without rebuilding, so most forks
  # never need to set these at build time.
  PROJECT_NAME:
    sh: echo "${PROJECT_NAME:-}"
  PROJECT_REPO_URL:
    sh: echo "${PROJECT_REPO_URL:-}"
  PROJECT_COMMUNITY_URL:
    sh: echo "${PROJECT_COMMUNITY_URL:-}"
  # Common build flags
  TENSORFLOW_HEADERS_DIR: '{{.ROOT_DIR}}/.cache/tensorflow'
  # OpenVINO C API headers (used only by openvino-tagged builds). The headers are
  # architecture-independent plain C declarations, so one download serves every
  # target arch; the runtime library is dlopen'd at execution time (the backend
  # links only -ldl), so no per-arch .so is needed at build time. The include
  # path below is added to CGO_CFLAGS unconditionally: GCC silently ignores a
  # missing -I directory, so non-openvino builds are unaffected when the cache
  # is absent, while openvino builds populate it via the check-openvino task.
  OPENVINO_RELEASE: '2026.2'
  OPENVINO_BUILD: '2026.2.0.21903.52ddc073857'
  # Archive basename, defined once so the URL and the tar member path cannot
  # drift apart. The arm64 package is the canonical source: its runtime/include
  # C API headers are identical across arch packages, so it serves amd64 too.
  OPENVINO_BASENAME: 'openvino_toolkit_ubuntu22_{{.OPENVINO_BUILD}}_arm64'
  OPENVINO_HEADERS_DIR: '{{.ROOT_DIR}}/.cache/openvino'
  CGO_FLAGS: CGO_ENABLED=1 CGO_CFLAGS="-I{{.TENSORFLOW_HEADERS_DIR}} -I{{.OPENVINO_HEADERS_DIR}}/include"
  EXTRA_BUILD_TAGS: '{{.EXTRA_BUILD_TAGS | default ""}}'
  BUILD_TAGS_FLAG:
    sh: |
      if [ -n "{{.EXTRA_BUILD_TAGS}}" ]; then
        echo "-tags {{.EXTRA_BUILD_TAGS}}"
      fi
  LDFLAGS: -ldflags "-s -w -X 'main.buildDate={{.BUILD_DATE}}' -X 'main.version={{.VERSION}}' -X 'github.com/tphakala/birdnet-go/internal/telemetry.sentryDSN={{.SENTRY_DSN}}' -X 'github.com/tphakala/birdnet-go/internal/branding.projectName={{.PROJECT_NAME}}' -X 'github.com/tphakala/birdnet-go/internal/branding.projectRepoURL={{.PROJECT_REPO_URL}}' -X 'github.com/tphakala/birdnet-go/internal/branding.projectCommunityURL={{.PROJECT_COMMUNITY_URL}}'"
  BUILD_FLAGS: '{{.BUILD_TAGS_FLAG}} {{.LDFLAGS}}'
  # System paths for native library installation (used by download/verify tasks)
  SYSTEM_LIB_DIR: /usr/lib
  # Cross-compilation sysroot (used by linux_arm64 build targets on x86 hosts)
  CROSS_LIB_DIR_ARM64: /usr/aarch64-linux-gnu/lib

tasks:
  default:
    deps: [native-target]

  # Task for running tests
  test:
    desc: Run tests for the application
    cmds:
      # Use noembed,skipfrontend tags to skip model and frontend embedding for faster tests
      # CGO_FLAGS supplies CGO_ENABLED=1 and the TensorFlow header include path;
      # -race needs CGO so it must stay enabled here.
      - '{{.CGO_FLAGS}} go test -tags noembed,skipfrontend -race ./... {{.TEST_FLAGS}}'
    vars:
      TEST_FLAGS: '{{default "" .CLI_ARGS}}'

  # Task for running tests with verbose output
  test-verbose:
    desc: Run tests with verbose output
    cmds:
      - task: test
        vars: {CLI_ARGS: "-v"}

  # Task for running tests with coverage report
  test-coverage:
    desc: Run tests with coverage report
    cmds:
      - mkdir -p coverage
      # Use noembed,skipfrontend tags to skip model and frontend embedding for faster tests
      # Keep -race in sync with the test task so coverage runs catch data races too.
      - '{{.CGO_FLAGS}} go test -tags noembed,skipfrontend -race ./... -coverprofile=coverage/coverage.out {{.TEST_FLAGS}}'
      - go tool cover -html=coverage/coverage.out -o coverage/coverage.html
    vars:
      TEST_FLAGS: '{{default "" .CLI_ARGS}}'

  # Go linting with CGO support for TensorFlow
  lint:
    desc: Run golangci-lint with TensorFlow CGO flags
    cmds:
      - |
        # Determine library path based on OS and architecture
        case "{{.UNAME_S}}_{{.UNAME_M}}" in
          Darwin_arm64) LIB_DIR="/opt/homebrew/lib";;
          Darwin_*) LIB_DIR="/usr/local/lib";;
          Linux_*) LIB_DIR="{{.SYSTEM_LIB_DIR}}";;
          *) echo "unsupported platform: {{.UNAME_S}}_{{.UNAME_M}}" >&2; exit 1;;
        esac
        # Use noembed,skipfrontend tags to skip model and frontend embedding for faster linting
        {{.CGO_FLAGS}} CGO_LDFLAGS="-L${LIB_DIR} -ltensorflowlite_c" \
        golangci-lint run --build-tags=noembed,skipfrontend {{.CLI_ARGS}}
    vars:
      CLI_ARGS: '{{default "-v" .CLI_ARGS}}'

  lint-fix:
    desc: Run golangci-lint with auto-fix enabled
    cmds:
      - task: lint
        vars: {CLI_ARGS: "--fix -v"}

  download-avicommons-data:
    desc: Download the Avicommons latest.json data file if it doesn't exist
    dir: '{{.AVICOMMONS_DATA_DIR}}'
    cmds:
      - |
        if [ ! -f "{{.AVICOMMONS_JSON_FILE}}" ]; then
          echo "Downloading Avicommons data file ({{.AVICOMMONS_JSON_FILE}})..."
          curl -fL -o "{{.AVICOMMONS_JSON_FILE}}" "{{.AVICOMMONS_JSON_URL}}"
        else
          echo "Avicommons data file ({{.AVICOMMONS_JSON_FILE}}) already exists."
        fi
    status:
      - '[ -f "{{.AVICOMMONS_JSON_FILE}}" ]'

  generate-species-dict:
    desc: Regenerate per-locale species dictionaries from the OpenFauna dataset
    cmds:
      - go generate ./internal/speciesdict
    sources:
      - internal/openfauna/data/translations.csv.gz
      - internal/openfauna/data/SOURCE.txt
      - internal/openfauna/data/locales.txt
      - internal/openfauna/dictionary.go
      - internal/openfauna/resolver.go
      - internal/speciesdict/gen/main.go
    generates:
      - internal/speciesdict/data/*.json.gz

  native-target:
    cmds:
      - |
        if [ "{{.OS}}" = "unsupported" ] || [ "{{.ARCH}}" = "unsupported" ]; then
          echo "Error: Unsupported platform combination: OS={{.OS}}, ARCH={{.ARCH}}"
          exit 1
        fi
      - task: "{{OS}}_{{ARCH}}"
    vars:
      OS:
        sh: |
          case "{{.UNAME_S}}" in
            Linux) echo "linux";;
            Darwin) echo "darwin";;
            *) echo "unsupported";;
          esac
      ARCH:
        sh: |
          case "{{.UNAME_M}}" in
            x86_64) echo "amd64";;
            aarch64|arm64) echo "arm64";;
            *) echo "unsupported";;
          esac

  setup-dev:
    desc: Setup development environment on Linux (apt) or macOS (homebrew)
    cmds:
      - |
        echo "🚀 BirdNET-Go Development Environment Setup"
        echo ""
        echo "⚠️  This setup requires administrator privileges:"
        echo "    - Linux: sudo access for system packages (you may be prompted for password)"
        echo "    - macOS: Homebrew must be installed first"
        echo ""
        echo "This will install:"
        echo "  • Go {{.GO_VERSION}}"
        echo "  • Node.js LTS"
        echo "  • Build tools (gcc, git, wget, etc.)"
        echo "  • Go dev tools (golangci-lint, air)"
        echo "  • TFLite C library and ONNX Runtime"
        echo "  • Frontend dependencies and Playwright browsers"
        echo ""
        printf "Continue with setup? (y/N) "
        read REPLY
        case "$REPLY" in
          [Yy]|[Yy][Ee][Ss]) ;;
          *) echo "Setup cancelled."; exit 1 ;;
        esac
      - task: detect-and-install-deps
      - task: install-go-tools
      - task: setup-frontend-dev
      - task: frontend-build
      - task: check-tensorflow
      - task: check-tflite-lib
      - task: download-onnxruntime
      - task: verify-dev-setup
      - |
        echo ""
        echo "✅ Development environment setup complete!"
        echo ""
        echo "⚠️  If Go was just installed, run: source ~/.profile"
        echo ""
        echo "Start developing:"
        echo "  air realtime       # Hot reload dev server (or: task dev_server)"
        echo ""

  detect-and-install-deps:
    desc: Detect OS and install system dependencies
    internal: true
    cmds:
      - |
        echo "🔍 Detecting operating system..."

        # Use uname for reliable OS detection (OSTYPE is bash-specific and may be empty)
        DETECTED_OS="$(uname -s)"

        if [ "$DETECTED_OS" = "Linux" ]; then
          echo "📦 Installing dependencies for Linux (apt-based)..."

          # Check if running as root or with sudo
          if [ "$EUID" -ne 0 ]; then
            SUDO="sudo"
          else
            SUDO=""
          fi

          # Update package list
          $SUDO apt-get update

          # Install base development tools
          $SUDO apt-get install -y \
            build-essential \
            git \
            wget \
            curl \
            unzip \
            ca-certificates

          # Audio capture library (required at runtime for microphone access)
          # and tools for full test coverage (spectrogram, audio duration, clip export)
          # Use libasound2-dev which works on both Debian/Ubuntu <24.04 (libasound2)
          # and Ubuntu 24.04+ (libasound2t64 via time_t transition)
          $SUDO apt-get install -y libasound2-dev ffmpeg sox

          # Install Go if not present or version is too old
          # Version comes from go.mod via Taskfile var
          GO_VERSION="{{.GO_VERSION}}"
          REQUIRED_GO_MINOR=$(echo "$GO_VERSION" | cut -d. -f1,2)
          INSTALL_GO=false

          if ! command -v go >/dev/null 2>&1; then
            echo "📥 Go not found, installing Go ${GO_VERSION}..."
            INSTALL_GO=true
          else
            CURRENT_GO_VERSION=$(go version | awk '{print $3}' | sed 's/go//')
            CURRENT_GO_MINOR=$(echo "$CURRENT_GO_VERSION" | cut -d. -f1,2)

            case "$CURRENT_GO_MINOR" in
              ${REQUIRED_GO_MINOR}*)
                echo "✅ Go ${CURRENT_GO_VERSION} is already installed (meets requirement)"
                ;;
              *)
                echo "⚠️  Go ${CURRENT_GO_VERSION} found, but Go ${REQUIRED_GO_MINOR}.x required"
                echo "   Current: ${CURRENT_GO_VERSION}"
                echo "   Required: ${REQUIRED_GO_MINOR}.x"
                echo ""
                printf "   Upgrade to Go ${GO_VERSION}? (y/N) "
                read REPLY
                case "$REPLY" in
                  [Yy]|[Yy][Ee][Ss]) INSTALL_GO=true ;;
                  *) echo "⚠️  Continuing with Go ${CURRENT_GO_VERSION} - you may encounter compatibility issues" ;;
                esac
                ;;
            esac
          fi

          if [ "$INSTALL_GO" = true ]; then
            echo "📥 Installing Go ${GO_VERSION}..."
            case "$(uname -m)" in
              x86_64) GO_ARCH="amd64";;
              aarch64|arm64) GO_ARCH="arm64";;
              *) echo "❌ Unsupported architecture: $(uname -m)"; exit 1;;
            esac
            GO_TARBALL="go${GO_VERSION}.linux-${GO_ARCH}.tar.gz"
            if ! wget "https://go.dev/dl/${GO_TARBALL}"; then
              echo "❌ Failed to download Go ${GO_VERSION} for ${GO_ARCH}"
              echo "   Check your internet connection and try again"
              exit 1
            fi

            $SUDO rm -rf /usr/local/go
            if ! $SUDO tar -C /usr/local -xzf "${GO_TARBALL}"; then
              echo "❌ Failed to extract Go ${GO_VERSION}"
              rm -f "${GO_TARBALL}"
              exit 1
            fi
            rm -f "${GO_TARBALL}"

            # Add Go to PATH if not already there
            if ! grep -q "/usr/local/go/bin" ~/.profile 2>/dev/null; then
              echo 'export PATH=$PATH:/usr/local/go/bin' >> ~/.profile
              echo 'export PATH=$PATH:$HOME/go/bin' >> ~/.profile
              echo "⚠️  Please run 'source ~/.profile' or restart your shell"
            fi
            export PATH=$PATH:/usr/local/go/bin:$HOME/go/bin
            echo "✅ Go ${GO_VERSION} installed successfully"
          fi

          # Install Node.js (LTS) if not present
          if ! command -v node >/dev/null 2>&1; then
            echo "📥 Installing Node.js LTS..."
            # Install latest LTS (currently 22.x, but will update automatically)
            # Add timeout for script download and execution
            if ! timeout 120 bash -c "curl -fsSL https://deb.nodesource.com/setup_lts.x | $SUDO -E bash -"; then
              echo "❌ Failed to setup NodeSource repository"
              echo "   Check your internet connection and try again"
              exit 1
            fi
            if ! $SUDO apt-get install -y nodejs; then
              echo "❌ Failed to install Node.js"
              exit 1
            fi
            INSTALLED_NODE=$(node --version)
            echo "✅ Node.js ${INSTALLED_NODE} installed"
          else
            echo "✅ Node.js $(node --version) is already installed"
          fi

          # Install cross-compilation toolchains (optional)
          if ! command -v aarch64-linux-gnu-gcc >/dev/null 2>&1; then
            echo ""
            echo "🔧 ARM64 cross-compilation tools (optional):"
            echo "   Allows building for ARM64/aarch64 from x86_64"
            echo "   Useful for building for Raspberry Pi, etc."
            echo ""
            printf "   Install ARM64 cross-compilation tools? (y/N) "
            read REPLY
            case "$REPLY" in
              [Yy]|[Yy][Ee][Ss])
                echo "📥 Installing ARM64 cross-compilation tools..."
                $SUDO apt-get install -y gcc-aarch64-linux-gnu
                echo "✅ ARM64 cross-compilation tools installed"
                ;;
              *)
                echo "⏭️  Skipping ARM64 cross-compilation tools"
                ;;
            esac
          else
            echo "✅ ARM64 cross-compilation tools already installed"
          fi

          # Install task if not present
          if ! command -v task >/dev/null 2>&1; then
            echo "📥 Installing Task (go-task)..."
            sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b /usr/local/bin
          fi

        elif [ "$DETECTED_OS" = "Darwin" ]; then
          echo "📦 Installing dependencies for macOS (homebrew)..."

          # Check if homebrew is installed
          if ! command -v brew >/dev/null 2>&1; then
            echo "❌ Homebrew not found. Please install it first:"
            echo "   /bin/bash -c \"\$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)\""
            exit 1
          fi

          # Update homebrew
          brew update

          # Install base tools and audio dependencies
          brew install git wget curl ffmpeg sox

          # Install Go with version checking
          # Version comes from go.mod via Taskfile var
          GO_VERSION="{{.GO_VERSION}}"
          REQUIRED_GO_MINOR=$(echo "$GO_VERSION" | cut -d. -f1,2)
          INSTALL_GO=false

          if ! command -v go >/dev/null 2>&1; then
            echo "📥 Go not found, installing..."
            INSTALL_GO=true
          else
            CURRENT_GO_VERSION=$(go version | awk '{print $3}' | sed 's/go//')
            CURRENT_GO_MINOR=$(echo "$CURRENT_GO_VERSION" | cut -d. -f1,2)

            case "$CURRENT_GO_MINOR" in
              ${REQUIRED_GO_MINOR}*)
                echo "✅ Go ${CURRENT_GO_VERSION} is already installed (meets requirement)"
                ;;
              *)
                echo "⚠️  Go ${CURRENT_GO_VERSION} found, but Go ${REQUIRED_GO_MINOR}.x required"
                echo "   Current: ${CURRENT_GO_VERSION}"
                echo "   Required: ${REQUIRED_GO_MINOR}.x"
                echo ""
                printf "   Upgrade to Go ${REQUIRED_GO_MINOR}? (y/N) "
                read REPLY
                case "$REPLY" in
                  [Yy]|[Yy][Ee][Ss]) INSTALL_GO=true ;;
                  *) echo "⚠️  Continuing with Go ${CURRENT_GO_VERSION} - you may encounter compatibility issues" ;;
                esac
                ;;
            esac
          fi

          if [ "$INSTALL_GO" = true ]; then
            echo "📥 Installing Go ${REQUIRED_GO_MINOR}..."
            # Try versioned formula first, fallback to latest
            if brew install "go@${REQUIRED_GO_MINOR}" 2>/dev/null; then
              echo "✅ Go ${REQUIRED_GO_MINOR}.x installed via go@${REQUIRED_GO_MINOR}"
              brew link "go@${REQUIRED_GO_MINOR}" || true
            else
              echo "⚠️  go@${REQUIRED_GO_MINOR} formula not available, installing latest Go"
              brew install go
              INSTALLED_VERSION=$(go version | awk '{print $3}' | sed 's/go//')
              echo "✅ Go ${INSTALLED_VERSION} installed"
              case "$INSTALLED_VERSION" in
                ${REQUIRED_GO_MINOR}*) ;;
                *) echo "⚠️  Installed version may not match project requirements" ;;
              esac
            fi
          fi

          # Install Node.js LTS (current LTS, not locked to specific version)
          if ! command -v node >/dev/null 2>&1; then
            echo "📥 Installing Node.js LTS..."
            # Install latest LTS instead of locking to Node 22
            brew install node
            INSTALLED_NODE=$(node --version)
            echo "✅ Node.js ${INSTALLED_NODE} installed"
          else
            echo "✅ Node.js $(node --version) is already installed"
          fi

          # Install task
          if ! command -v task >/dev/null 2>&1; then
            echo "📥 Installing Task (go-task)..."
            brew install go-task
          fi

        else
          echo "❌ Unsupported operating system: $DETECTED_OS"
          echo "This script supports Linux (apt-based) and macOS (homebrew)"
          exit 1
        fi

        echo "✅ System dependencies installed"

  install-go-tools:
    desc: Install Go development tools
    internal: true
    cmds:
      - |
        echo "🔧 Installing Go development tools..."

        # Install golangci-lint
        if ! command -v golangci-lint >/dev/null 2>&1; then
          echo "📥 Installing golangci-lint..."
          # Add timeout for install script download and execution
          if ! timeout 120 bash -c "curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b \$(go env GOPATH)/bin"; then
            echo "❌ Failed to install golangci-lint"
            echo "   Check your internet connection and try again"
            exit 1
          fi
        else
          echo "✅ golangci-lint already installed"
        fi

        # Install air for hot reload (required for dev workflow)
        if ! command -v air >/dev/null 2>&1; then
          echo "📥 Installing air (hot reload)..."
          if ! go install github.com/air-verse/air@latest; then
            echo "❌ Failed to install air"
            exit 1
          fi
        else
          echo "✅ air already installed"
        fi

        echo "✅ Go tools installed"

  setup-frontend-dev:
    desc: Setup frontend development environment
    internal: true
    dir: frontend
    cmds:
      - |
        echo "🎨 Setting up frontend development environment..."

        # Install frontend dependencies
        if [ ! -d "node_modules" ]; then
          echo "📥 Installing frontend dependencies..."
          if ! npm install; then
            echo "❌ Failed to install frontend dependencies"
            echo "   Check your network connection and try again"
            exit 1
          fi
        else
          echo "✅ Frontend dependencies already installed"
        fi

        # Install Playwright browsers for E2E testing
        echo "📥 Installing Playwright browsers..."
        if ! npx playwright install --with-deps chromium; then
          echo "❌ Failed to install Playwright browsers"
          echo "   You can install them later with: cd frontend && npx playwright install --with-deps chromium"
          echo "⚠️  Continuing setup without Playwright browsers"
        else
          echo "✅ Playwright browsers installed"
        fi

        # Initialize Husky for git hooks (pre-commit checks)
        echo "🪝 Setting up git hooks with Husky..."
        if [ -d "{{.ROOT_DIR}}/.git" ]; then
          if ! npm run prepare; then
            echo "⚠️  Failed to initialize Husky"
            echo "   Git hooks won't be active, but you can initialize later with: cd frontend && npm run prepare"
          else
            echo "✅ Git hooks initialized"
            echo "   Pre-commit hook will run golangci-lint and frontend linting automatically"
          fi
        else
          echo "⚠️  Not a git repository, skipping Husky setup"
        fi

        echo "✅ Frontend setup complete"

  verify-dev-setup:
    desc: Verify development environment setup
    internal: true
    cmds:
      - |
        echo ""
        echo "🔍 Verifying development environment..."
        echo ""

        # Check Go with version validation (from go.mod)
        REQUIRED_GO_MINOR=$(echo "{{.GO_VERSION}}" | cut -d. -f1,2)
        if command -v go >/dev/null 2>&1; then
          CURRENT_GO_VERSION=$(go version | awk '{print $3}' | sed 's/go//')
          CURRENT_GO_MINOR=$(echo "$CURRENT_GO_VERSION" | cut -d. -f1,2)

          case "$CURRENT_GO_MINOR" in
            ${REQUIRED_GO_MINOR}*)
              echo "✅ Go: ${CURRENT_GO_VERSION} (meets ${REQUIRED_GO_MINOR}.x requirement)"
              ;;
            *)
              echo "❌ Go: ${CURRENT_GO_VERSION} found, but ${REQUIRED_GO_MINOR}.x required"
              echo "   Current version does not match project requirements"
              echo "   Run 'task setup-dev' to install the correct version"
              exit 1
              ;;
          esac
        else
          echo "❌ Go: not found"
          echo "   Run 'task setup-dev' to install Go"
          exit 1
        fi

        # Check Node.js
        if command -v node >/dev/null 2>&1; then
          echo "✅ Node.js: $(node --version)"
        else
          echo "❌ Node.js: not found"
          exit 1
        fi

        # Check npm
        if command -v npm >/dev/null 2>&1; then
          echo "✅ npm: $(npm --version)"
        else
          echo "❌ npm: not found"
          exit 1
        fi

        # Check golangci-lint (required for pre-commit linting)
        if command -v golangci-lint >/dev/null 2>&1; then
          echo "✅ golangci-lint: $(golangci-lint --version | head -n1)"
        else
          echo "❌ golangci-lint: not found (required for development)"
          exit 1
        fi

        # Check air (required for hot reload development)
        if command -v air >/dev/null 2>&1; then
          echo "✅ air: installed"
        else
          echo "❌ air: not found (required for 'task dev_server' and 'air' commands)"
          exit 1
        fi

        # Check task
        if command -v task >/dev/null 2>&1; then
          echo "✅ task: $(task --version)"
        else
          echo "❌ task: not found"
          exit 1
        fi

        # Check git
        if command -v git >/dev/null 2>&1; then
          echo "✅ git: $(git --version)"
        else
          echo "❌ git: not found"
          exit 1
        fi

        # Check frontend dependencies
        if [ -d "frontend/node_modules" ]; then
          echo "✅ Frontend dependencies: installed"
        else
          echo "❌ Frontend dependencies: not installed"
          exit 1
        fi

        # Check git hooks (Husky pre-commit)
        if [ -f ".git/hooks/pre-commit" ]; then
          echo "✅ Git hooks: configured (pre-commit checks active)"
        else
          echo "⚠️  Git hooks: not initialized"
          echo "   Run: cd frontend && npm run prepare"
        fi

        # Check Playwright (optional for E2E tests)
        if (cd frontend && npx playwright --version >/dev/null 2>&1); then
          PLAYWRIGHT_VERSION=$(cd frontend && npx playwright --version)
          echo "✅ Playwright: ${PLAYWRIGHT_VERSION}"
        else
          echo "⚠️  Playwright: not installed (optional for E2E tests)"
          echo "   Install with: cd frontend && npx playwright install --with-deps chromium"
        fi

        # ALSA library (required at runtime for audio capture on Linux)
        if [ "$(uname -s)" = "Linux" ]; then
          if ldconfig -p 2>/dev/null | grep -q libasound.so.2; then
            echo "✅ ALSA (libasound2): installed"
          else
            echo "❌ ALSA (libasound2): not found (audio capture will fail at runtime)"
            echo "   Install with: sudo apt-get install libasound2-dev"
          fi
        fi

        # ONNX Runtime (required for BirdNET v3.0 and ONNX models)
        ONNX_LIB_DIR=""
        case "$(uname -s)_$(uname -m)" in
          Darwin_arm64) ONNX_LIB_DIR="/opt/homebrew/lib";;
          Darwin_*) ONNX_LIB_DIR="/usr/local/lib";;
          Linux_*) ONNX_LIB_DIR="{{.SYSTEM_LIB_DIR}}";;
          *) echo "⚠️  ONNX Runtime: unsupported platform $(uname -s)_$(uname -m), skipping check";;
        esac
        if [ -n "${ONNX_LIB_DIR}" ] && ls "${ONNX_LIB_DIR}"/libonnxruntime.*{{.ONNXRUNTIME_VERSION}}* >/dev/null 2>&1; then
          echo "✅ ONNX Runtime: {{.ONNXRUNTIME_VERSION}} installed in ${ONNX_LIB_DIR}"
        elif [ -n "${ONNX_LIB_DIR}" ] && ls "${ONNX_LIB_DIR}"/libonnxruntime.* >/dev/null 2>&1; then
          echo "⚠️  ONNX Runtime: installed in ${ONNX_LIB_DIR} but version {{.ONNXRUNTIME_VERSION}} not found"
          echo "   Update with: task download-onnxruntime"
        else
          echo "⚠️  ONNX Runtime: not found (required for ONNX models including BirdNET v3.0)"
          echo "   Install with: task download-onnxruntime"
        fi

        # Audio tools (optional but needed for full test coverage)
        if command -v ffmpeg >/dev/null 2>&1; then
          echo "✅ FFmpeg: $(ffmpeg -version 2>&1 | head -n1)"
        else
          echo "⚠️  FFmpeg: not found (audio export and clip tests will be skipped)"
        fi

        if command -v sox >/dev/null 2>&1; then
          echo "✅ SoX: $(sox --version 2>&1 | head -n1)"
        else
          echo "⚠️  SoX: not found (spectrogram and audio duration tests will be skipped)"
        fi

        echo ""
        echo "✅ All required tools are installed"

  check-tools:
    cmds:
      - |
        for cmd in go unzip git wget; do
          if ! command -v $cmd >/dev/null; then
            echo "$cmd not found. Please install it."
            exit 1
          fi
        done

  check-tensorflow:
    desc: Clone TensorFlow headers for CGo compilation
    cmds:
      - |
        if [ ! -f "{{.TENSORFLOW_HEADERS_DIR}}/tensorflow/lite/c/c_api.h" ]; then
          echo "TensorFlow Lite C API header not found. Cloning TensorFlow source..."
          mkdir -vp "$(dirname "{{.TENSORFLOW_HEADERS_DIR}}")"
          echo "Cloning TensorFlow source..."
          git clone --branch {{.TFLITE_VERSION}} --filter=blob:none --no-checkout --depth 1 https://github.com/tensorflow/tensorflow.git "{{.TENSORFLOW_HEADERS_DIR}}"
          echo "Setting up sparse checkout..."
          git -C "{{.TENSORFLOW_HEADERS_DIR}}" sparse-checkout set --no-cone '**/*.h'
          echo "Checking out TensorFlow source..."
          git -C "{{.TENSORFLOW_HEADERS_DIR}}" checkout
        else
          echo "Checking TensorFlow version..."
          current_version=$(git -C "{{.TENSORFLOW_HEADERS_DIR}}" describe --tags)
          if [ "$current_version" != "{{.TFLITE_VERSION}}" ]; then
            echo "Switching TensorFlow source to version {{.TFLITE_VERSION}}..."
            git -C "{{.TENSORFLOW_HEADERS_DIR}}" fetch --depth 1 origin {{.TFLITE_VERSION}}
            git -C "{{.TENSORFLOW_HEADERS_DIR}}" checkout {{.TFLITE_VERSION}}
          else
            echo "TensorFlow headers already at version {{.TFLITE_VERSION}}"
          fi
        fi

  check-openvino:
    desc: Download OpenVINO C API headers for CGo compilation (openvino-tagged builds only)
    internal: true
    vars:
      OPENVINO_ARCHIVE: '{{.OPENVINO_BASENAME}}.tgz'
      OPENVINO_URL: 'https://storage.openvinotoolkit.org/repositories/openvino/packages/{{.OPENVINO_RELEASE}}/linux/{{.OPENVINO_BASENAME}}.tgz'
    # Skip entirely unless this is an openvino build, otherwise skip when the
    # header tree is already cached. Either status command succeeding marks the
    # task up-to-date, so the download runs only when OPENVINO=true and the
    # headers are missing.
    status:
      - '[ "{{.OPENVINO}}" != "true" ] || [ -f "{{.OPENVINO_HEADERS_DIR}}/include/openvino/c/openvino.h" ]'
    cmds:
      - |
        set -euo pipefail
        echo "OpenVINO C API headers not found. Downloading {{.OPENVINO_ARCHIVE}}..."
        mkdir -p "{{.OPENVINO_HEADERS_DIR}}"
        # Stage on the cache filesystem so publishing the headers is a same-fs
        # rename (atomic), not a cross-fs copy that could leave a half-populated
        # tree if interrupted.
        ov_tmp=$(mktemp -d "{{.OPENVINO_HEADERS_DIR}}/.dl.XXXXXX")
        trap 'rm -rf "${ov_tmp}"' EXIT
        # wget exits non-zero on hard HTTP errors (e.g. 404); set -e then aborts.
        wget -q --tries=3 --timeout=30 "{{.OPENVINO_URL}}" -O "${ov_tmp}/openvino.tgz"
        # Extract only the architecture-independent C API header tree
        # (runtime/include); the runtime .so is dlopen'd at deploy time and is
        # never linked here.
        tar -xzf "${ov_tmp}/openvino.tgz" -C "${ov_tmp}" --strip-components=2 \
          "{{.OPENVINO_BASENAME}}/runtime/include"
        # Publish: rm-then-rename avoids nesting into a pre-existing dir, and the
        # same-fs rename keeps the swap atomic. The final sentinel check turns a
        # partial extract or an HTTP-200 HTML error page (returned for a moved
        # upstream archive) into a loud failure rather than a silently
        # half-populated cache that the status guard would later treat as valid.
        rm -rf "{{.OPENVINO_HEADERS_DIR}}/include"
        mv "${ov_tmp}/include" "{{.OPENVINO_HEADERS_DIR}}/include"
        test -f "{{.OPENVINO_HEADERS_DIR}}/include/openvino/c/openvino.h"
        echo "OpenVINO headers installed to {{.OPENVINO_HEADERS_DIR}}/include"

  check-tflite-lib:
    desc: Download TensorFlow Lite C library for the current platform
    internal: true
    cmds:
      - task: download-tflite
        vars:
          TFLITE_LIB_DIR:
            sh: |
              case "{{.UNAME_S}}_{{.UNAME_M}}" in
                Darwin_arm64) echo "/opt/homebrew/lib";;
                Darwin_*) echo "/usr/local/lib";;
                Linux_*) echo "{{.SYSTEM_LIB_DIR}}";;
                *) echo "unsupported platform: {{.UNAME_S}}_{{.UNAME_M}}" >&2; exit 1;;
              esac
          TFLITE_LIB_ARCH:
            sh: |
              case "{{.UNAME_S}}_{{.UNAME_M}}" in
                Linux_x86_64) echo "linux_amd64.tar.gz";;
                Linux_aarch64|Linux_arm64) echo "linux_arm64.tar.gz";;
                Darwin_x86_64) echo "darwin_amd64.tar.gz";;
                Darwin_arm64) echo "darwin_arm64.tar.gz";;
                *) echo "unsupported platform: {{.UNAME_S}}_{{.UNAME_M}}" >&2; exit 1;;
              esac
          TARGET:
            sh: |
              case "{{.UNAME_S}}_{{.UNAME_M}}" in
                Linux_x86_64) echo "linux_amd64";;
                Linux_aarch64|Linux_arm64) echo "linux_arm64";;
                Darwin_x86_64) echo "darwin_amd64";;
                Darwin_arm64) echo "darwin_arm64";;
                *) echo "unsupported platform: {{.UNAME_S}}_{{.UNAME_M}}" >&2; exit 1;;
              esac

  dev_server:
    cmds:
      - air realtime

  # Frontend build tasks
  frontend-install:
    desc: Install frontend dependencies
    dir: frontend
    # run: once guarantees a single execution per `task` invocation even when
    # reached through multiple dependency paths. frontend-build depends on both
    # frontend-install and frontend-typecheck, and frontend-typecheck also
    # depends on frontend-install, forming a diamond. With the default
    # run: always, go-task runs frontend-build's deps concurrently and executes
    # frontend-install twice in parallel, so two `npm install` processes write
    # the same node_modules at once. That race truncates large files (e.g.
    # typescript.js), and svelte-check then fails with "Unexpected end of input".
    # The race is timing dependent, which is why it flaked only intermittently
    # and mostly on the arm64 runner.
    run: once
    cmds:
      - |
        max_retries=3
        for attempt in $(seq 1 $max_retries); do
          if npm install; then
            exit 0
          fi
          echo "npm install failed (attempt $attempt/$max_retries)"
          if [ "$attempt" -lt "$max_retries" ]; then
            echo "Cleaning node_modules and retrying in 5s..."
            rm -rf node_modules
            sleep 5
          fi
        done
        exit 1
    sources:
      - package.json
      - package-lock.json
    generates:
      - node_modules/.package-lock.json

  frontend-typecheck:
    desc: Run TypeScript type checking on frontend
    dir: frontend
    deps: [frontend-install]
    cmds:
      - npm run typecheck
    sources:
      - src/**/*
      - tsconfig.json
      - package.json

  frontend-build:
    desc: Build frontend for production with strict type checking
    dir: frontend
    deps: [frontend-install, frontend-typecheck]
    cmds:
      - npm run build
    sources:
      - src/**/*
      - index.html
      - vite.config.js
      - package.json
    generates:
      - dist/**/*

  frontend-dev:
    desc: Start Vite dev server with HMR (access via localhost:5173)
    dir: frontend
    deps: [frontend-install]
    cmds:
      - npm run dev

  frontend-watch:
    desc: Build frontend in watch mode (auto-rebuild on changes)
    dir: frontend
    deps: [frontend-install]
    cmds:
      - |
        echo "🔧 Starting frontend watch mode..."
        echo "   Files will be rebuilt automatically when changed"
        echo "   The Go server will serve these files from disk"
        echo ""
      - npm run build -- --watch

  dev:
    desc: Show instructions for frontend development workflow
    cmds:
      - |
        echo ""
        echo "🚀 BirdNET-Go Frontend Development Workflow"
        echo ""
        echo "The Go server automatically detects and serves frontend files from disk"
        echo "when frontend/dist/ exists, enabling fast frontend iteration without"
        echo "rebuilding the Go binary."
        echo ""
        echo "Option 1: Watch Mode (recommended for most development)"
        echo "==========================================================="
        echo "Terminal 1: task frontend-watch    # Auto-rebuilds on file changes"
        echo "Terminal 2: ./bin/birdnet-go realtime  # Or: air realtime (for Go changes)"
        echo "Access: http://localhost:8080"
        echo ""
        echo "Option 2: Vite Dev Server (for HMR - instant updates)"
        echo "==========================================================="
        echo "Terminal 1: task frontend-dev      # Vite dev server with HMR"
        echo "Terminal 2: ./bin/birdnet-go realtime  # Backend for API calls"
        echo "Access: http://localhost:5173      # Note: different port!"
        echo ""
        echo "Option 3: Backend-only development (Go changes)"
        echo "==========================================================="
        echo "Terminal 1: task frontend-watch    # Keep frontend fresh"
        echo "Terminal 2: air realtime           # Auto-rebuilds Go on changes"
        echo "Access: http://localhost:8080"
        echo ""
        echo "Quick Start:"
        echo "  task frontend-watch  # In one terminal"
        echo "  air realtime         # In another terminal"
        echo ""

  frontend-lint:
    desc: Lint frontend code
    dir: frontend
    deps: [frontend-install]
    cmds:
      - npm run check:all

  frontend-lint-fix:
    desc: Fix frontend linting issues automatically
    dir: frontend
    deps: [frontend-install]
    cmds:
      - npm run format
      - npm run lint -- --fix
      - npm run ast:fix

  frontend-ast-fix:
    desc: Auto-fix ast-grep detected issues
    dir: frontend
    deps: [frontend-install]
    cmds:
      - npm run ast:fix

  frontend-test:
    desc: Run frontend tests
    dir: frontend
    deps: [frontend-install]
    cmds:
      - npm run test -- --run

  # Integration Testing Tasks
  integration-backend:
    desc: Start backend for integration testing (air with hot reload)
    cmds:
      - air realtime

  integration-test:
    desc: Run frontend integration tests (backend must be running)
    dir: frontend
    deps: [frontend-install]
    cmds:
      - |
        if ! curl -s http://localhost:8080/api/v2/health > /dev/null 2>&1; then
          echo "⚠️  Backend not running at localhost:8080"
          echo "   Start it with: task integration-backend"
          echo "   Or use: task integration-test-auto (starts backend automatically)"
          echo ""
          echo "Running tests anyway (they will be skipped if backend unavailable)..."
        fi
      - npm run test:integration -- --run

  integration-test-auto:
    desc: Run integration tests with automatic backend management
    dir: frontend
    deps: [frontend-install]
    cmds:
      - |
        echo "🧪 Running integration tests with auto-managed backend..."
        echo "   Backend will be started automatically by Vitest global setup"
      - npm run test:integration:auto -- --run

  frontend-test-coverage:
    desc: Run frontend tests with coverage
    dir: frontend
    deps: [frontend-install]
    cmds:
      - npm run test:coverage

  frontend-quality:
    desc: Run comprehensive frontend quality checks and auto-fix issues
    dir: frontend
    deps: [frontend-install]
    cmds:
      - npm run format
      - npm run lint -- --fix
      - npm run ast:fix
      - npm run check:all
      - npm run test:ci
      - npm run audit:security
      - npm run analyze:circular
      - npm run build
      - npm run analyze:bundle:size

  # Format all markdown files with prettier
  format-md:
    desc: Format all markdown files in the project with prettier
    dir: frontend
    deps: [frontend-install]
    cmds:
      - npx prettier --write "../**/*.md"

  # E2E Testing Tasks
  e2e-install:
    desc: Install E2E testing dependencies
    dir: frontend
    cmds:
      - npm install -D @playwright/test playwright @axe-core/playwright
      - npx playwright install

  e2e-test:
    desc: Run end-to-end tests
    dir: frontend
    deps: [frontend-build, e2e-install]
    cmds:
      - npx playwright test

  e2e-test-headed:
    desc: Run E2E tests in headed mode for debugging
    dir: frontend
    cmds:
      - npx playwright test --headed

  e2e-test-ui:
    desc: Run E2E tests with Playwright UI mode
    dir: frontend
    cmds:
      - npx playwright test --ui

  e2e-test-mobile:
    desc: Run E2E tests on mobile devices only
    dir: frontend
    cmds:
      - npx playwright test --grep="mobile|responsive"

  e2e-test-performance:
    desc: Run performance-focused E2E tests
    dir: frontend
    cmds:
      - npx playwright test --grep="performance"

  e2e-report:
    desc: Open E2E test report
    dir: frontend
    cmds:
      - npx playwright show-report

  clean:
    cmds:
      - go clean
      - rm -rf {{.BINARY_DIR}}/* tflite_c *.tar.gz *.zip
      - rm -f {{.AVICOMMONS_DATA_DIR}}/{{.AVICOMMONS_JSON_FILE}}
      - rm -rf frontend/dist frontend/node_modules

  # Database migration tools
  dbexport:
    desc: Build the SQLite to MySQL export tool
    cmds:
      - go build -ldflags "-X 'main.version={{.VERSION}}'" -o {{.BINARY_DIR}}/dbexport ./tools/dbexport

  # Non-embedded builds (without embedded models - smaller binary size)
  noembed:
    desc: Build for native platform without embedded models
    deps: [noembed-native-target]

  noembed-native-target:
    cmds:
      - |
        if [ "{{.OS}}" = "unsupported" ] || [ "{{.ARCH}}" = "unsupported" ]; then
          echo "Error: Unsupported platform combination: OS={{.OS}}, ARCH={{.ARCH}}"
          exit 1
        fi
      - task: "noembed_{{OS}}_{{ARCH}}"
    vars:
      OS:
        sh: |
          case "{{.UNAME_S}}" in
            Linux) echo "linux";;
            Darwin) echo "darwin";;
            *) echo "unsupported";;
          esac
      ARCH:
        sh: |
          case "{{.UNAME_M}}" in
            x86_64) echo "amd64";;
            aarch64|arm64) echo "arm64";;
            *) echo "unsupported";;
          esac

  linux_amd64:
    deps: [check-tools, check-tensorflow, download-avicommons-data, frontend-build]
    vars:
      TFLITE_LIB_DIR: '{{.DOCKER_LIB_DIR | default .SYSTEM_LIB_DIR}}'
      TFLITE_LIB_ARCH: linux_amd64.tar.gz
      TARGET: linux_amd64
    cmds:
      - task: download-tflite
        vars: {TFLITE_LIB_DIR: '{{.TFLITE_LIB_DIR}}', TFLITE_LIB_ARCH: '{{.TFLITE_LIB_ARCH}}', TARGET: '{{.TARGET}}'}
      - |
        mkdir -p {{.TFLITE_LIB_DIR}}
        GOOS=linux GOARCH=amd64 {{.CGO_FLAGS}} \
        CGO_LDFLAGS="-L{{.TFLITE_LIB_DIR}} -ltensorflowlite_c" \
        go build -trimpath {{.BUILD_FLAGS}} -o {{.BINARY_DIR}}/{{.BINARY_NAME}}

  linux_arm64:
    deps: [check-tools, check-tensorflow, download-avicommons-data, frontend-build]
    vars:
      TFLITE_LIB_DIR: '{{.DOCKER_LIB_DIR | default .CROSS_LIB_DIR_ARM64}}'
      TFLITE_LIB_ARCH: linux_arm64.tar.gz
      TARGET: linux_arm64
    cmds:
      - task: download-tflite
        vars: {TFLITE_LIB_DIR: '{{.TFLITE_LIB_DIR}}', TFLITE_LIB_ARCH: '{{.TFLITE_LIB_ARCH}}', TARGET: '{{.TARGET}}'}
      - |
        mkdir -p {{.TFLITE_LIB_DIR}}
        if [ "$(uname -m)" != "aarch64" ]; then
          export CC=aarch64-linux-gnu-gcc
        fi
        GOOS=linux GOARCH=arm64 {{.CGO_FLAGS}} \
        CGO_LDFLAGS="-L{{.TFLITE_LIB_DIR}} -ltensorflowlite_c" \
        go build -trimpath {{.BUILD_FLAGS}} -o {{.BINARY_DIR}}/{{.BINARY_NAME}}

  windows_amd64:
    deps: [check-tools, check-tensorflow, download-avicommons-data, frontend-build]
    vars:
      TFLITE_LIB_DIR: /usr/x86_64-w64-mingw32/lib
      TFLITE_LIB_ARCH: windows_amd64.zip
      TARGET: windows_amd64
    cmds:
      - task: download-tflite
        vars: {TFLITE_LIB_DIR: '{{.TFLITE_LIB_DIR}}', TFLITE_LIB_ARCH: '{{.TFLITE_LIB_ARCH}}', TARGET: '{{.TARGET}}'}
      - |
        GOOS=windows GOARCH=amd64 {{.CGO_FLAGS}} \
        CC=x86_64-w64-mingw32-gcc \
        CGO_LDFLAGS="-L{{.TFLITE_LIB_DIR}} -ltensorflowlite_c" \
        go build -trimpath {{.BUILD_FLAGS}} -o {{.BINARY_DIR}}/{{.BINARY_NAME}}.exe

  darwin_amd64:
    deps: [check-tools, check-tensorflow, download-avicommons-data, frontend-build]
    vars:
      TFLITE_LIB_DIR: /usr/local/lib
      TFLITE_LIB_ARCH: darwin_amd64.tar.gz
      TARGET: darwin_amd64
    cmds:
      - task: download-tflite
        vars: {TFLITE_LIB_DIR: '{{.TFLITE_LIB_DIR}}', TFLITE_LIB_ARCH: '{{.TFLITE_LIB_ARCH}}', TARGET: '{{.TARGET}}'}
      - |
        GOOS=darwin GOARCH=amd64 {{.CGO_FLAGS}} \
        CGO_LDFLAGS="-L{{.TFLITE_LIB_DIR}} -ltensorflowlite_c" \
        go build -trimpath {{.BUILD_FLAGS}} -o {{.BINARY_DIR}}/{{.BINARY_NAME}}

  darwin_arm64:
    deps: [check-tools, check-tensorflow, download-avicommons-data, frontend-build]
    vars:
      TFLITE_LIB_DIR: /opt/homebrew/lib
      TFLITE_LIB_ARCH: darwin_arm64.tar.gz
      TARGET: darwin_arm64
    cmds:
      - task: download-tflite
        vars: {TFLITE_LIB_DIR: '{{.TFLITE_LIB_DIR}}', TFLITE_LIB_ARCH: '{{.TFLITE_LIB_ARCH}}', TARGET: '{{.TARGET}}'}
      - |
        GOOS=darwin GOARCH=arm64 {{.CGO_FLAGS}} \
        CGO_LDFLAGS="-L{{.TFLITE_LIB_DIR}} -ltensorflowlite_c" \
        go build -trimpath {{.BUILD_FLAGS}} -o {{.BINARY_DIR}}/{{.BINARY_NAME}}

  download-tflite:
    internal: true
    vars:
      LIB_FILENAME:
        sh: |
          case "{{.TARGET}}" in
            windows_amd64) echo "tensorflowlite_c-${TFLITE_VERSION#v}.dll";;
            linux*) echo "libtensorflowlite_c.so.${TFLITE_VERSION#v}";;
            darwin*) echo "libtensorflowlite_c.${TFLITE_VERSION#v}.dylib";;
          esac
    cmds:
      - |
        if [ ! -f "{{.TFLITE_LIB_DIR}}/{{.LIB_FILENAME}}" ]; then
          echo "TensorFlow Lite C library not found. Downloading..."
          wget -q "https://github.com/tphakala/tflite_c/releases/download/{{.TFLITE_VERSION}}/tflite_c_{{.TFLITE_VERSION}}_{{.TFLITE_LIB_ARCH}}" -P ./
          
          # Only create directory if it doesn't exist
          if [ ! -d "{{.TFLITE_LIB_DIR}}" ]; then
            if [ -w "$(dirname "{{.TFLITE_LIB_DIR}}")" ] 2>/dev/null; then
              mkdir -p "{{.TFLITE_LIB_DIR}}"
            else
              sudo mkdir -p "{{.TFLITE_LIB_DIR}}"
            fi
          fi
          
          case "{{.TFLITE_LIB_ARCH}}" in
            *.zip)
              unzip -o "tflite_c_{{.TFLITE_VERSION}}_{{.TFLITE_LIB_ARCH}}"
              if [ -w "{{.TFLITE_LIB_DIR}}" ]; then
                mv "{{.LIB_FILENAME}}" "{{.TFLITE_LIB_DIR}}/"
              else
                sudo mv "{{.LIB_FILENAME}}" "{{.TFLITE_LIB_DIR}}/"
              fi
              ;;
            *)
              tar -xzf "tflite_c_{{.TFLITE_VERSION}}_{{.TFLITE_LIB_ARCH}}"
              if [ -w "{{.TFLITE_LIB_DIR}}" ]; then
                mv "{{.LIB_FILENAME}}" "{{.TFLITE_LIB_DIR}}/"
              else
                sudo mv "{{.LIB_FILENAME}}" "{{.TFLITE_LIB_DIR}}/"
              fi
              ;;
          esac

          rm -f "tflite_c_{{.TFLITE_VERSION}}_{{.TFLITE_LIB_ARCH}}"
        fi
      - task: ensure-tflite-symlinks
        vars: {LIB_DIR: '{{.TFLITE_LIB_DIR}}', LIB_FILENAME: '{{.LIB_FILENAME}}'}

  # Internal task for building noembed binaries across platforms
  noembed_build:
    internal: true
    deps: [check-tools, check-tensorflow, download-avicommons-data, frontend-build]
    cmds:
      - task: download-tflite
        vars:
          TFLITE_LIB_DIR: '{{.TFLITE_LIB_DIR}}'
          TFLITE_LIB_ARCH: '{{.TFLITE_LIB_ARCH}}'
          TARGET: '{{.TARGET}}'
      # Fetch the OpenVINO C API headers when this is an openvino build; the task
      # no-ops for ONNX-only/standard builds (OPENVINO unset or "false").
      - task: check-openvino
        vars:
          OPENVINO: '{{.OPENVINO}}'
      - mkdir -p {{.BINARY_DIR}}
      - |
        {{if .CROSS_COMPILE_CHECK}}
        if [ "$(uname -m)" != "{{.CROSS_COMPILE_CHECK}}" ]; then
          export CC={{.CC}}
        fi
        {{else if .CC}}
        export CC={{.CC}}
        {{end}}
        BUILD_TAGS="noembed"
        # notflite produces an ONNX-only binary that does not link libtensorflowlite_c.
        if [ "{{.NOTFLITE}}" = "true" ]; then
          BUILD_TAGS="${BUILD_TAGS},notflite"
        fi
        # openvino adds the OpenVINO inference backend (dlopen'd at runtime, ORT
        # fallback). Headers are provided by the check-openvino task above. Only
        # the linux noembed targets set OPENVINO; windows/darwin leave it unset
        # by design (the OpenVINO backend is linux-only here).
        if [ "{{.OPENVINO}}" = "true" ]; then
          BUILD_TAGS="${BUILD_TAGS},openvino"
        fi
        if [ -n "${EXTRA_BUILD_TAGS:-}" ]; then
          BUILD_TAGS="${BUILD_TAGS},${EXTRA_BUILD_TAGS}"
        fi
        TFLITE_LDFLAGS="-L{{.TFLITE_LIB_DIR}} -ltensorflowlite_c"
        if [ "{{.NOTFLITE}}" = "true" ]; then
          TFLITE_LDFLAGS=""
        fi
        GOOS={{.GOOS}} GOARCH={{.GOARCH}} {{.CGO_FLAGS}} \
          CGO_LDFLAGS="${TFLITE_LDFLAGS}" \
          go build -trimpath -tags ${BUILD_TAGS} {{.LDFLAGS}} -o {{.BINARY_DIR}}/{{.BINARY_NAME}}{{.BINARY_SUFFIX}}
        echo "Built non-embedded binary: {{.BINARY_DIR}}/{{.BINARY_NAME}}{{.BINARY_SUFFIX}}"
        echo "Note: This binary requires external model files to run"

  noembed_linux_amd64:
    desc: Build Linux AMD64 without embedded models (TFLite + ONNX + OpenVINO)
    cmds:
      - task: noembed_build
        vars:
          TFLITE_LIB_DIR: '{{.DOCKER_LIB_DIR | default .SYSTEM_LIB_DIR}}'
          TFLITE_LIB_ARCH: linux_amd64.tar.gz
          TARGET: linux_amd64
          GOOS: linux
          GOARCH: amd64
          BINARY_SUFFIX: ''
          # amd64 includes the OpenVINO backend by default (activates on an Intel
          # iGPU at runtime, otherwise falls back to ONNX Runtime). The standard
          # Docker and CI images pass OPENVINO=false to stay ONNX-only.
          OPENVINO: '{{.OPENVINO | default "true"}}'

  noembed_linux_arm64:
    desc: Build Linux ARM64 without embedded models (ONNX + OpenVINO, no TFLite)
    cmds:
      - task: noembed_build
        vars:
          TFLITE_LIB_DIR: '{{.DOCKER_LIB_DIR | default .CROSS_LIB_DIR_ARM64}}'
          TFLITE_LIB_ARCH: linux_arm64.tar.gz
          TARGET: linux_arm64
          GOOS: linux
          GOARCH: arm64
          CROSS_COMPILE_CHECK: 'aarch64'
          CC: 'aarch64-linux-gnu-gcc'
          BINARY_SUFFIX: ''
          # arm64 ships ONNX-only: build without the TFLite backend so the binary
          # does not link libtensorflowlite_c (issue #1103).
          NOTFLITE: 'true'
          # arm64 includes the OpenVINO backend by default (activates on A76/ARMv8.2
          # at runtime, otherwise falls back to ONNX Runtime). The standard Docker
          # and CI images pass OPENVINO=false to stay strictly ONNX-only.
          OPENVINO: '{{.OPENVINO | default "true"}}'

  noembed_windows_amd64:
    desc: Build Windows AMD64 without embedded models
    cmds:
      - task: noembed_build
        vars:
          TFLITE_LIB_DIR: /usr/x86_64-w64-mingw32/lib
          TFLITE_LIB_ARCH: windows_amd64.zip
          TARGET: windows_amd64
          GOOS: windows
          GOARCH: amd64
          CC: x86_64-w64-mingw32-gcc
          BINARY_SUFFIX: '.exe'

  noembed_darwin_amd64:
    desc: Build Darwin AMD64 without embedded models
    cmds:
      - task: noembed_build
        vars:
          TFLITE_LIB_DIR: /usr/local/lib
          TFLITE_LIB_ARCH: darwin_amd64.tar.gz
          TARGET: darwin_amd64
          GOOS: darwin
          GOARCH: amd64
          BINARY_SUFFIX: ''

  noembed_darwin_arm64:
    desc: Build Darwin ARM64 without embedded models
    cmds:
      - task: noembed_build
        vars:
          TFLITE_LIB_DIR: /opt/homebrew/lib
          TFLITE_LIB_ARCH: darwin_arm64.tar.gz
          TARGET: darwin_arm64
          GOOS: darwin
          GOARCH: arm64
          BINARY_SUFFIX: ''

  ensure-tflite-symlinks:
    internal: true
    cmds:
      - |
        # Only create directory if it doesn't exist
        if [ ! -d "{{.LIB_DIR}}" ]; then
          if [ -w "$(dirname "{{.LIB_DIR}}")" ] 2>/dev/null; then
            mkdir -p "{{.LIB_DIR}}"
          else
            sudo mkdir -p "{{.LIB_DIR}}"
          fi
        fi
      - |
        case "{{.LIB_FILENAME}}" in
          *.dll)
            if [ ! -f "{{.LIB_DIR}}/tensorflowlite_c.dll" ]; then
              if [ -w "{{.LIB_DIR}}" ]; then
                ln -sf "{{.LIB_DIR}}/{{.LIB_FILENAME}}" "{{.LIB_DIR}}/tensorflowlite_c.dll"
              else
                sudo ln -sf "{{.LIB_DIR}}/{{.LIB_FILENAME}}" "{{.LIB_DIR}}/tensorflowlite_c.dll"
              fi
            fi
            ;;
          *)
            if [ "{{.UNAME_S}}" = "Linux" ] && [ ! -f "{{.LIB_DIR}}/libtensorflowlite_c.so" ]; then
              if [ -w "{{.LIB_DIR}}" ]; then
                cd {{.LIB_DIR}} && \
                ln -sf {{.LIB_FILENAME}} libtensorflowlite_c.so.2 && \
                ln -sf libtensorflowlite_c.so.2 libtensorflowlite_c.so
              else
                cd {{.LIB_DIR}} && \
                sudo ln -sf {{.LIB_FILENAME}} libtensorflowlite_c.so.2 && \
                sudo ln -sf libtensorflowlite_c.so.2 libtensorflowlite_c.so
              fi
            elif [ "{{.UNAME_S}}" = "Darwin" ] && [ ! -f "{{.LIB_DIR}}/libtensorflowlite_c.dylib" ]; then
              cd {{.LIB_DIR}} && \
              ln -sf {{.LIB_FILENAME}} libtensorflowlite_c.dylib
            fi
            ;;
        esac

  download-onnxruntime:
    desc: Download and install ONNX Runtime library for the current platform
    status:
      - 'ls {{.ONNX_LIB_DIR}}/libonnxruntime.*{{.ONNXRUNTIME_VERSION}}* >/dev/null 2>&1'
    vars:
      ONNX_LIB_DIR:
        sh: |
          case "{{.UNAME_S}}_{{.UNAME_M}}" in
            Darwin_arm64) echo "/opt/homebrew/lib";;
            Darwin_*) echo "/usr/local/lib";;
            Linux_*) echo "{{.SYSTEM_LIB_DIR}}";;
            *) echo "unsupported platform: {{.UNAME_S}}_{{.UNAME_M}}" >&2; exit 1;;
          esac
      ONNX_ARCHIVE:
        sh: |
          case "{{.UNAME_S}}_{{.UNAME_M}}" in
            Linux_x86_64) echo "onnxruntime-linux-x64-{{.ONNXRUNTIME_VERSION}}.tgz";;
            Linux_aarch64|Linux_arm64) echo "onnxruntime-linux-aarch64-{{.ONNXRUNTIME_VERSION}}.tgz";;
            Darwin_x86_64) echo "onnxruntime-osx-x86_64-{{.ONNXRUNTIME_VERSION}}.tgz";;
            Darwin_arm64) echo "onnxruntime-osx-arm64-{{.ONNXRUNTIME_VERSION}}.tgz";;
            *) echo "unsupported platform: {{.UNAME_S}}_{{.UNAME_M}}" >&2; exit 1;;
          esac
      ONNX_LIB_NAME:
        sh: |
          case "{{.UNAME_S}}" in
            Linux) echo "libonnxruntime.so";;
            Darwin) echo "libonnxruntime.dylib";;
            *) echo "unsupported: {{.UNAME_S}}" >&2; exit 1;;
          esac
    cmds:
      - |
        echo "Downloading ONNX Runtime {{.ONNXRUNTIME_VERSION}}..."
        curl -fsSL "https://github.com/microsoft/onnxruntime/releases/download/v{{.ONNXRUNTIME_VERSION}}/{{.ONNX_ARCHIVE}}" \
          -o /tmp/onnxruntime.tgz

        mkdir -p /tmp/onnxruntime
        tar -xzf /tmp/onnxruntime.tgz -C /tmp/onnxruntime --strip-components=1
        rm /tmp/onnxruntime.tgz

        # Create target directory if needed
        if [ ! -d "{{.ONNX_LIB_DIR}}" ]; then
          if [ -w "$(dirname "{{.ONNX_LIB_DIR}}")" ] 2>/dev/null; then
            mkdir -p "{{.ONNX_LIB_DIR}}"
          else
            sudo mkdir -p "{{.ONNX_LIB_DIR}}"
          fi
        fi

        # Install library files
        if [ -w "{{.ONNX_LIB_DIR}}" ]; then
          cp /tmp/onnxruntime/lib/{{.ONNX_LIB_NAME}}* "{{.ONNX_LIB_DIR}}/"
        else
          sudo cp /tmp/onnxruntime/lib/{{.ONNX_LIB_NAME}}* "{{.ONNX_LIB_DIR}}/"
        fi

        rm -rf /tmp/onnxruntime

        # Update library cache on Linux
        if [ "{{.UNAME_S}}" = "Linux" ]; then
          sudo ldconfig 2>/dev/null || true
        fi

        echo "ONNX Runtime {{.ONNXRUNTIME_VERSION}} installed to {{.ONNX_LIB_DIR}}"
